<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maxwell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  }

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --bg:       #0a0a0d;
  --s1:       #0f0f14;
  --s2:       #141419;
  --s3:       #1a1a22;
  --s4:       #22222e;
  --border:   #2a2a38;
  --border2:  #333345;
  --text:     #d4d4e0;
  --muted:    #6b6b82;
  --muted2:   #4a4a60;
  --accent:   #7c3aed;
  --accent2:  #9d5cf6;
  --aglow:    rgba(124,58,237,0.15);
  --aglow2:   rgba(124,58,237,0.08);
  --green:    #10b981;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --blue:     #60a5fa;
  --pink:     #f472b6;
  --mono:     'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  --ui:       'Inter', system-ui, sans-serif;
}

html,body,#root { height:100%; background:var(--bg); color:var(--text); font-family:var(--ui); font-size:13px; overflow:hidden; }

/* ── Scrollbars ── */
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:var(--border2); }

/* ── Layout shell ── */
.ide { display:flex; flex-direction:column; height:100vh; }

/* ── Title bar ── */
.titlebar {
  height:38px; display:flex; align-items:center; gap:0;
  background:var(--s1); border-bottom:1px solid var(--border);
  flex-shrink:0; user-select:none;
}
.titlebar-drag { -webkit-app-region:drag; flex:1; display:flex; align-items:center; }
.tb-logo { font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:4px; color:var(--accent2); padding:0 16px; }
.tb-sep { width:1px; height:16px; background:var(--border); margin:0 4px; }
.tb-project { font-size:12px; color:var(--muted); padding:0 12px; display:flex; align-items:center; gap:6px; }
.tb-project span { color:var(--text); font-weight:500; }
.tb-spacer { flex:1; }
.tb-status { display:flex; align-items:center; gap:10px; padding:0 12px; }
.tb-persona { display:flex; align-items:center; gap:5px; font-size:11px; padding:3px 8px; border-radius:4px; background:var(--s3); border:1px solid var(--border); }
.tb-persona .p-icon { font-size:13px; }
.tb-persona .p-name { color:var(--text); font-weight:500; letter-spacing:.3px; }
.tension-wrap { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); }
.tension-track { width:60px; height:4px; background:var(--s4); border-radius:2px; overflow:hidden; }
.tension-bar { height:100%; background:var(--accent); border-radius:2px; transition:width .8s ease; }
.conn-dot { width:7px; height:7px; border-radius:50%; background:var(--muted2); flex-shrink:0; }
.conn-dot.live { background:var(--green); box-shadow:0 0 6px rgba(16,185,129,.6); animation:pulse 2.5s infinite; }
.conn-dot.err  { background:var(--red); }
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── Main body ── */
.ide-body { display:flex; flex:1; overflow:hidden; }

/* ── Activity bar ── */
.actbar {
  width:44px; flex-shrink:0; background:var(--s1); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; padding:8px 0; gap:2px;
}
.act-btn {
  width:34px; height:34px; border-radius:7px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; background:transparent; border:none; color:var(--muted); transition:all .15s;
  font-size:16px; position:relative;
}
.act-btn:hover { background:var(--s3); color:var(--text); }
.act-btn.active { background:var(--aglow); color:var(--accent2); }
.act-btn.active::before { content:''; position:absolute; left:0; top:50%; transform:translateY(-50%); width:2px; height:18px; background:var(--accent); border-radius:0 2px 2px 0; }
.act-spacer { flex:1; }
.act-badge { position:absolute; top:3px; right:3px; width:8px; height:8px; border-radius:50%; background:var(--accent); border:1.5px solid var(--s1); }

/* ── Sidebar ── */
.sidebar {
  width:220px; flex-shrink:0; background:var(--s2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; overflow:hidden;
}
.sb-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.sb-actions { display:flex; gap:2px; }
.sb-icon-btn { width:22px; height:22px; border-radius:4px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:var(--muted); cursor:pointer; font-size:14px; transition:all .12s; }
.sb-icon-btn:hover { background:var(--s4); color:var(--text); }
.sb-scroll { flex:1; overflow-y:auto; }

/* File tree */
.tree-item {
  display:flex; align-items:center; gap:5px; padding:3px 8px; cursor:pointer;
  border-radius:4px; margin:0 4px; transition:background .1s; user-select:none;
  font-size:12.5px;
}
.tree-item:hover { background:var(--s3); }
.tree-item.active { background:var(--aglow); color:var(--accent2); }
.tree-item .ti-icon { font-size:13px; flex-shrink:0; }
.tree-item .ti-name { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tree-item .ti-ext { font-size:10px; color:var(--muted2); }
.tree-group { padding:4px 0; }
.tree-group-label {
  padding:5px 12px 3px; font-size:10px; font-weight:700; letter-spacing:.8px;
  text-transform:uppercase; color:var(--muted2);
}
.tree-indent { padding-left:14px; }

/* Goals */
.goal-item {
  display:flex; align-items:flex-start; gap:7px; padding:6px 12px;
  border-bottom:1px solid var(--border); transition:background .1s;
}
.goal-item:hover { background:var(--s3); }
.goal-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); margin-top:4px; flex-shrink:0; }
.goal-dot.done { background:var(--green); }
.goal-text { font-size:12px; line-height:1.45; flex:1; }
.goal-done-btn { width:20px; height:20px; border-radius:3px; border:none; background:transparent; color:var(--muted2); cursor:pointer; font-size:12px; transition:all .12s; flex-shrink:0; }
.goal-done-btn:hover { color:var(--green); }
.add-goal-form { padding:8px 12px; display:flex; gap:6px; border-top:1px solid var(--border); }
.add-goal-input {
  flex:1; background:var(--s3); border:1px solid var(--border); color:var(--text);
  padding:5px 8px; border-radius:5px; font-size:11.5px; font-family:var(--ui); outline:none;
}
.add-goal-input:focus { border-color:var(--accent); }
.add-goal-btn { background:var(--accent); border:none; color:#fff; padding:5px 8px; border-radius:5px; font-size:11px; cursor:pointer; font-weight:600; }

/* ── Editor pane ── */
.editor-pane { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

/* Tabs */
.tabs-bar {
  display:flex; align-items:center; background:var(--s1); border-bottom:1px solid var(--border);
  flex-shrink:0; overflow-x:auto; height:34px;
}
.tabs-bar::-webkit-scrollbar { height:0; }
.tab {
  display:flex; align-items:center; gap:6px; padding:0 12px; height:34px;
  border-right:1px solid var(--border); cursor:pointer; font-size:12px;
  white-space:nowrap; transition:background .1s; flex-shrink:0;
  color:var(--muted); position:relative;
}
.tab:hover { background:var(--s2); color:var(--text); }
.tab.active { background:var(--bg); color:var(--text); }
.tab.active::after { content:''; position:absolute; bottom:0; left:0; right:0; height:1px; background:var(--accent); }
.tab-icon { font-size:12px; }
.tab-close { width:16px; height:16px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:11px; color:transparent; transition:all .1s; }
.tab:hover .tab-close { color:var(--muted); }
.tab-close:hover { background:var(--s4); color:var(--text) !important; }
.tab-welcome { margin-left:auto; padding:0 10px; color:var(--muted2); font-size:11px; font-style:italic; }

/* Code editor */
.code-editor-wrap { flex:1; display:flex; overflow:hidden; position:relative; }
.line-numbers {
  width:44px; flex-shrink:0; background:var(--s1); border-right:1px solid var(--border);
  overflow:hidden; padding:10px 0; text-align:right; user-select:none;
}
.line-num { font-family:var(--mono); font-size:12px; color:var(--muted2); line-height:1.7; padding:0 8px; }
.code-area {
  flex:1; overflow:auto; padding:10px 16px;
  font-family:var(--mono); font-size:12.5px; line-height:1.7;
  color:var(--text); background:var(--bg); outline:none; white-space:pre;
  tab-size:2;
}
.code-area::-webkit-scrollbar { width:6px; height:6px; }

/* Syntax tokens */
.t-kw   { color:#c084fc; }
.t-str  { color:#86efac; }
.t-num  { color:#fbbf24; }
.t-cmt  { color:#4a5568; font-style:italic; }
.t-type { color:#67e8f9; }
.t-fn   { color:#93c5fd; }
.t-op   { color:#f0abfc; }
.t-prop { color:#fda4af; }

/* Welcome screen */
.welcome {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:16px; color:var(--muted); padding:40px;
}
.welcome-logo { font-family:var(--mono); font-size:32px; font-weight:600; letter-spacing:8px; color:var(--accent); opacity:.4; }
.welcome-hint { font-size:12px; text-align:center; line-height:1.8; }
.welcome-hint kbd { background:var(--s3); border:1px solid var(--border); padding:2px 6px; border-radius:3px; font-family:var(--mono); font-size:11px; color:var(--text); }

/* ── Bottom panel ── */
.bottom-panel { display:flex; flex-direction:column; border-top:1px solid var(--border); background:var(--s1); flex-shrink:0; }
.bp-resize { height:4px; cursor:ns-resize; background:transparent; flex-shrink:0; }
.bp-resize:hover { background:var(--accent); opacity:.5; }
.bp-tabs { display:flex; align-items:center; border-bottom:1px solid var(--border); height:30px; padding:0 8px; gap:0; }
.bp-tab { padding:0 12px; height:30px; display:flex; align-items:center; font-size:11.5px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all .12s; }
.bp-tab:hover { color:var(--text); }
.bp-tab.active { color:var(--text); border-bottom-color:var(--accent); }
.bp-close { margin-left:auto; }
.terminal-body { flex:1; overflow-y:auto; padding:8px 12px; font-family:var(--mono); font-size:12px; line-height:1.65; }
.term-line { display:flex; gap:8px; }
.term-prompt { color:var(--accent2); flex-shrink:0; }
.term-cmd { color:var(--text); }
.term-out { color:var(--muted); }
.term-err { color:var(--red); }
.term-ok  { color:var(--green); }
.term-info{ color:var(--blue); }
.term-cursor { display:inline-block; width:8px; height:14px; background:var(--accent); vertical-align:middle; animation:blink 1s infinite; }
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ── MAX chat panel ── */
.max-panel {
  width:380px; flex-shrink:0; border-left:1px solid var(--border);
  display:flex; flex-direction:column; background:var(--s1);
}
.mp-header {
  display:flex; align-items:center; gap:10px; padding:0 14px; height:38px;
  border-bottom:1px solid var(--border); flex-shrink:0;
}
.mp-title { font-size:12px; font-weight:700; letter-spacing:2px; color:var(--accent2); font-family:var(--mono); }
.mp-mode { margin-left:auto; display:flex; gap:4px; }
.mp-mode-btn {
  padding:2px 8px; border-radius:4px; font-size:10.5px; border:1px solid var(--border);
  background:transparent; color:var(--muted); cursor:pointer; transition:all .12s;
  font-weight:600; letter-spacing:.3px;
}
.mp-mode-btn:hover { border-color:var(--border2); color:var(--text); }
.mp-mode-btn.active { background:var(--aglow); border-color:var(--accent); color:var(--accent2); }

/* Messages */
.mp-messages { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:14px; }
.msg { display:flex; gap:8px; animation:fadeUp .2s ease; }
.msg.user { flex-direction:row-reverse; }
@keyframes fadeUp{from{opacity:0;transform:translateY(5px)}to{opacity:1}}
.msg-avatar {
  width:26px; height:26px; border-radius:7px; display:flex; align-items:center;
  justify-content:center; font-size:13px; flex-shrink:0; margin-top:1px;
}
.msg.user .msg-avatar { background:var(--accent); color:#fff; font-size:11px; font-weight:700; }
.msg.max .msg-avatar  { background:var(--s3); border:1px solid var(--border); }
.msg-body { flex:1; min-width:0; }
.msg-meta { font-size:10px; color:var(--muted2); margin-bottom:3px; display:flex; align-items:center; gap:6px; }
.msg.user .msg-meta { justify-content:flex-end; }
.msg-persona { font-size:10px; font-weight:600; letter-spacing:.3px; }
.bubble {
  padding:8px 12px; border-radius:8px; line-height:1.65; font-size:12.5px;
  word-break:break-word;
}
.msg.user .bubble { background:#1e1040; border:1px solid #3d1f80; color:var(--text); border-radius:8px 2px 8px 8px; }
.msg.max  .bubble { background:var(--s2); border:1px solid var(--border); border-radius:2px 8px 8px 8px; }

/* Markdown in bubbles */
.bubble p { margin:4px 0; }
.bubble p:first-child { margin-top:0; }
.bubble p:last-child  { margin-bottom:0; }
.bubble strong { font-weight:600; color:#e0e0f0; }
.bubble em { font-style:italic; color:#b8a9f0; }
.bubble code { background:#0a0a10; border:1px solid var(--border); padding:1px 4px; border-radius:3px; font-family:var(--mono); font-size:11.5px; color:#c4b5fd; }
.bubble pre { background:#05050a; border:1px solid var(--border); border-radius:6px; padding:10px; margin:6px 0; overflow-x:auto; }
.bubble pre code { background:none; border:none; padding:0; font-size:11.5px; }
.bubble ul { padding-left:16px; margin:4px 0; }
.bubble li { margin:2px 0; }
.bubble h2 { font-size:13px; font-weight:700; margin:6px 0 3px; color:#e0e0f0; }
.bubble h3, .bubble h4 { font-size:12.5px; font-weight:700; margin:6px 0 3px; color:#d0d0e8; }

/* Tool call chips */
.tool-call {
  display:flex; align-items:center; gap:6px; padding:5px 9px; margin:4px 0;
  background:var(--bg); border:1px solid var(--border); border-radius:5px;
  font-family:var(--mono); font-size:11px; color:var(--muted);
}
.tool-call .tc-icon { color:var(--amber); }
.tool-call .tc-path { color:var(--accent2); }
.tool-call .tc-ok   { color:var(--green); margin-left:auto; }

/* ── Inline tool call animation blocks ── */
.tcb { display:flex; align-items:center; gap:8px; padding:5px 10px; margin:3px 0;
  border-radius:6px; font-family:var(--mono); font-size:11px;
  border:1px solid var(--border); background:var(--s3);
  transition:border-color .3s, background .3s; }
.tcb.tcb-running { border-color:rgba(124,58,237,.5); background:rgba(124,58,237,.07); animation:tcb-pulse 1.8s ease-in-out infinite; }
.tcb.tcb-done    { border-color:rgba(16,185,129,.35); background:rgba(16,185,129,.05); }
.tcb.tcb-error   { border-color:rgba(239,68,68,.35);  background:rgba(239,68,68,.05); }
@keyframes tcb-pulse { 0%,100%{border-color:rgba(124,58,237,.3)} 50%{border-color:rgba(124,58,237,.7)} }
.tcb-icon { font-size:13px; flex-shrink:0; }
.tcb-verb { color:var(--muted); font-size:10.5px; flex-shrink:0; min-width:56px; }
.tcb-param { color:var(--accent2); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
.tcb-state { margin-left:auto; flex-shrink:0; font-size:11px; display:flex; align-items:center; gap:4px; }
.tcb-spinner { display:inline-block; animation:tcb-spin .8s linear infinite; }
@keyframes tcb-spin { to { transform:rotate(360deg); } }

/* ── Agent task tracker bar ── */
.atb { margin:6px 10px; border-radius:8px; border:1px solid var(--border); background:var(--s2); overflow:hidden; transition:all .3s; }
.atb.atb-running { border-color:rgba(124,58,237,.4); animation:tcb-pulse 2s ease-in-out infinite; }
.atb.atb-done    { border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.04); animation:none; }
.atb.atb-failed  { border-color:rgba(239,68,68,.4);  background:rgba(239,68,68,.04);  animation:none; }
.atb-header { display:flex; align-items:center; gap:8px; padding:7px 12px; font-size:12px; font-weight:600; }
.atb-icon { font-size:14px; flex-shrink:0; }
.atb-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.atb-badge { font-size:10px; font-weight:700; padding:2px 6px; border-radius:3px; flex-shrink:0; }
.atb-badge.running { background:rgba(124,58,237,.2); color:var(--accent2); }
.atb-badge.done    { background:rgba(16,185,129,.2);  color:var(--green); }
.atb-badge.failed  { background:rgba(239,68,68,.2);   color:var(--red); }
.atb-steps { padding:0 12px 8px; display:flex; flex-direction:column; gap:2px; }
.atb-step { display:flex; align-items:center; gap:6px; font-size:10.5px; font-family:var(--mono); color:var(--muted); padding:2px 0; }
.atb-step.done    { color:var(--text); }
.atb-step.failed  { color:var(--red); }
.atb-step.running { color:var(--accent2); }
.atb-step-icon { flex-shrink:0; width:14px; text-align:center; }
.atb-step-text { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }

/* Thinking indicator */
.thinking { display:flex; align-items:center; gap:8px; padding:6px 12px; }
.thinking-dots span { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--accent); margin:0 2px; animation:thinking .8s infinite; }
.thinking-dots span:nth-child(2) { animation-delay:.15s; }
.thinking-dots span:nth-child(3) { animation-delay:.3s; }
@keyframes thinking{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
.thinking-label { font-size:11px; color:var(--muted); font-style:italic; }

/* Insight chip */
.insight {
  padding:6px 10px; background:var(--aglow2); border:1px solid rgba(124,58,237,.3);
  border-radius:6px; font-size:11.5px; color:var(--muted); margin:2px 0;
}
.insight .ins-label { color:var(--accent2); font-weight:600; font-size:10px; letter-spacing:.5px; margin-bottom:2px; text-transform:uppercase; }

/* Input */
.mp-input-wrap { border-top:1px solid var(--border); padding:10px 12px; background:var(--s1); flex-shrink:0; }
.cmd-mode-badge {
  display:inline-flex; align-items:center; gap:4px; padding:2px 8px; margin-bottom:6px;
  background:var(--aglow); border:1px solid rgba(124,58,237,.3); border-radius:4px;
  font-size:10.5px; color:var(--accent2); font-weight:700; letter-spacing:.5px;
}
.cmd-mode-badge button { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:0 0 0 4px; }
.input-row { display:flex; gap:8px; align-items:flex-end; }
.mp-textarea {
  flex:1; background:var(--s3); border:1px solid var(--border); color:var(--text);
  padding:8px 12px; border-radius:8px; font-size:13px; resize:none; outline:none;
  font-family:var(--ui); line-height:1.5; min-height:38px; max-height:110px;
  transition:border-color .15s;
}
.mp-textarea:focus { border-color:var(--accent); box-shadow:0 0 0 2px var(--aglow); }
.mp-textarea::placeholder { color:var(--muted2); }
.send-btn {
  width:34px; height:34px; border-radius:7px; background:var(--accent); border:none;
  color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
  font-size:15px; transition:all .15s; flex-shrink:0;
}
.send-btn:hover { background:var(--accent2); }
.send-btn:disabled { opacity:.35; cursor:not-allowed; }

/* Slash command picker */
.slash-picker {
  position:absolute; bottom:calc(100% + 4px); left:0; right:0;
  background:var(--s2); border:1px solid var(--border); border-radius:8px;
  overflow:hidden; box-shadow:0 4px 24px rgba(0,0,0,.5);
}
.slash-item {
  display:flex; align-items:center; gap:10px; padding:7px 12px;
  cursor:pointer; transition:background .1s; font-size:12px;
}
.slash-item:hover, .slash-item.sel { background:var(--aglow); }
.slash-item .sc-cmd { color:var(--accent2); font-family:var(--mono); font-weight:600; min-width:80px; }
.slash-item .sc-desc { color:var(--muted); }

/* Status bar */
.statusbar {
  height:25px; display:flex; align-items:center; gap:0;
  background:var(--s2); color:var(--muted); font-size:11px;
  border-top:1px solid var(--border); flex-shrink:0; padding:0 10px;
}
.sb-item { display:flex; align-items:center; gap:4px; padding:0 8px; border-right:1px solid var(--border); height:25px; }
.sb-branch-text { max-width:140px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
.sb-item:last-child { border-right:none; }
.sb-spacer { flex:1; }
.sb-conn { display:flex; align-items:center; gap:4px; padding:0 8px; }

/* No connection overlay */
.no-conn {
  position:absolute; bottom:60px; left:50%; transform:translateX(-50%);
  background:var(--s2); border:1px solid var(--border); border-radius:8px;
  padding:10px 16px; font-size:12px; color:var(--muted); display:flex; align-items:center; gap:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.4); white-space:nowrap;
}
.no-conn .nc-dot { width:7px; height:7px; border-radius:50%; background:var(--red); flex-shrink:0; }


/* ── Pending changes banner ── */
.changes-banner {
  display:flex; align-items:center; gap:10px; padding:0 14px; height:38px;
  background:rgba(245,158,11,.08); border-bottom:2px solid rgba(245,158,11,.35);
  flex-shrink:0; animation:fadeUp .2s ease;
}
.changes-banner .cb-label { font-size:12px; color:var(--amber); font-weight:600; display:flex; align-items:center; gap:6px; flex:1; }
.cb-accept-all { padding:4px 14px; border-radius:5px; background:rgba(16,185,129,.15); border:1px solid rgba(16,185,129,.4); color:var(--green); font-size:11.5px; font-weight:700; cursor:pointer; transition:all .15s; }
.cb-accept-all:hover { background:rgba(16,185,129,.28); }
.cb-reject-all { padding:4px 12px; border-radius:5px; background:rgba(239,68,68,.1); border:1px solid rgba(239,68,68,.3); color:var(--red); font-size:11.5px; font-weight:700; cursor:pointer; transition:all .15s; }
.cb-reject-all:hover { background:rgba(239,68,68,.2); }
/* ── Tool chip accept/reject ── */
.tc-actions { display:flex; gap:4px; margin-left:auto; }
.tc-accept { width:22px; height:22px; border-radius:4px; border:none; background:rgba(16,185,129,.12); color:var(--green); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.tc-accept:hover { background:rgba(16,185,129,.28); }
.tc-reject { width:22px; height:22px; border-radius:4px; border:none; background:rgba(239,68,68,.1); color:var(--red); cursor:pointer; font-size:13px; display:flex; align-items:center; justify-content:center; transition:all .12s; }
.tc-reject:hover { background:rgba(239,68,68,.2); }
.tc-accepted { color:var(--green); font-size:11px; font-weight:700; display:flex; align-items:center; gap:3px; margin-left:auto; }
.tc-rejected { color:var(--muted2); font-size:11px; font-weight:700; text-decoration:line-through; margin-left:auto; }


/* ── Model picker pill (titlebar) ── */
.model-pill {
  display:flex; align-items:center; gap:6px; padding:4px 10px;
  background:var(--s3); border:1px solid var(--border); border-radius:6px;
  cursor:pointer; font-size:11.5px; font-weight:600; transition:all .15s;
  user-select:none; position:relative;
}
.model-pill:hover { border-color:var(--border2); background:var(--s4); }
.model-pill .mp-tier { font-weight:800; letter-spacing:.3px; }
.model-pill .mp-name { color:var(--muted); font-weight:400; max-width:90px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.model-pill .mp-caret { color:var(--muted2); font-size:9px; }
.model-dropdown {
  position:absolute; top:calc(100% + 6px); left:0; width:320px;
  background:var(--s2); border:1px solid var(--border); border-radius:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.6); z-index:300;
  animation:popUp .15s ease;
}
.md-scroll-area {
  overflow-y:auto; max-height:320px;
}
.md-scroll-area::-webkit-scrollbar { width:4px; }
.md-scroll-area::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
.md-section { padding:8px 0; border-bottom:1px solid var(--border); }
.md-section:last-child { border-bottom:none; }
.md-section-label { padding:6px 14px 4px; font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted2); }
.md-row {
  display:flex; align-items:center; gap:10px; padding:7px 14px;
  cursor:pointer; transition:background .1s;
}
.md-row:hover { background:var(--s3); }
.md-row.active { background:var(--aglow); }
.md-row .mr-icon { font-size:15px; width:22px; text-align:center; flex-shrink:0; font-family:var(--mono); }
.md-row .mr-info { flex:1; min-width:0; }
.md-row .mr-name { font-size:12px; font-weight:600; }
.md-row .mr-desc { font-size:10.5px; color:var(--muted); margin-top:1px; }
.md-row .mr-badge {
  font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:3px;
  letter-spacing:.4px; flex-shrink:0;
}
.badge-free   { background:rgba(16,185,129,.12); color:var(--green); border:1px solid rgba(16,185,129,.25); }
.badge-fast   { background:rgba(96,165,250,.12); color:var(--blue);  border:1px solid rgba(96,165,250,.25); }
.badge-smart  { background:rgba(124,58,237,.12); color:var(--accent2); border:1px solid rgba(124,58,237,.25); }
.badge-genius { background:rgba(244,114,182,.12); color:var(--pink); border:1px solid rgba(244,114,182,.25); }
.md-credits-bar {
  padding:10px 14px; border-top:1px solid var(--border);
  background:var(--bg);
}
.mcb-row { display:flex; align-items:center; justify-content:space-between; font-size:11px; margin-bottom:5px; }
.mcb-label { color:var(--muted); }
.mcb-val { color:var(--text); font-weight:600; font-family:var(--mono); }
.mcb-track { height:5px; background:var(--s4); border-radius:3px; overflow:hidden; }
.mcb-fill  { height:100%; border-radius:3px; transition:width .4s ease; }

/* ── Settings modal tabs ── */
.settings-tabs { display:flex; border-bottom:1px solid var(--border); margin-bottom:16px; }
.stab { padding:7px 14px; font-size:12px; cursor:pointer; color:var(--muted); border-bottom:2px solid transparent; transition:all .12s; }
.stab:hover { color:var(--text); }
.stab.active { color:var(--text); border-bottom-color:var(--accent); }
.settings-section { margin-bottom:18px; }
.ss-label { font-size:10px; font-weight:700; letter-spacing:.8px; text-transform:uppercase; color:var(--muted2); margin-bottom:8px; }
.ss-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; border-bottom:1px solid var(--border); }
.ss-row:last-child { border-bottom:none; }
.ss-key { font-size:12.5px; color:var(--text); }
.ss-val { font-size:12px; color:var(--muted); }
.settings-input {
  background:var(--s3); border:1px solid var(--border); color:var(--text);
  padding:5px 8px; border-radius:5px; font-size:12px; font-family:var(--mono);
  outline:none; transition:border-color .15s; width:100%;
}
.settings-input:focus { border-color:var(--accent); }
.settings-input-row { display:flex; gap:6px; margin-bottom:8px; }
.key-status { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.model-local-row {
  display:flex; align-items:center; gap:8px; padding:6px 0;
  border-bottom:1px solid var(--border); font-size:12px;
}
.model-local-row:last-child { border-bottom:none; }
.mlr-name { flex:1; font-family:var(--mono); font-size:11.5px; }
.mlr-size { color:var(--muted); font-size:11px; width:40px; text-align:right; }
.mlr-pull { padding:3px 8px; border-radius:4px; font-size:10.5px; font-weight:600; cursor:pointer; border:1px solid; transition:all .15s; }
.mlr-pull.installed { background:rgba(16,185,129,.1); color:var(--green); border-color:rgba(16,185,129,.3); }
.mlr-pull.available { background:transparent; color:var(--muted); border-color:var(--border); }
.mlr-pull.available:hover { border-color:var(--accent); color:var(--accent2); }
.mlr-pull.pulling { background:rgba(245,158,11,.1); color:var(--amber); border-color:rgba(245,158,11,.3); animation:pulse 1s infinite; }
.usage-bar-wrap { margin-bottom:12px; }
.usage-bar-label { display:flex; justify-content:space-between; font-size:11px; margin-bottom:5px; }
.usage-track { height:8px; background:var(--s4); border-radius:4px; overflow:hidden; }
.usage-fill  { height:100%; border-radius:4px; }
.usage-breakdown { display:flex; flex-direction:column; gap:4px; }
.ub-row { display:flex; align-items:center; gap:8px; font-size:11.5px; }
.ub-dot { width:8px; height:8px; border-radius:2px; flex-shrink:0; }
.ub-name { flex:1; color:var(--muted); }
.ub-val { color:var(--text); font-family:var(--mono); font-size:11px; }


/* ── Auto-route / model badge ── */
.msg-model-badge {
  display:inline-flex; align-items:center; gap:4px;
  font-size:9.5px; font-weight:700; letter-spacing:.4px;
  padding:1px 6px; border-radius:3px; margin-left:4px;
  text-transform:uppercase; opacity:.8;
}
.mmb-local  { background:rgba(16,185,129,.1); color:var(--green); border:1px solid rgba(16,185,129,.2); }
.mmb-cloud  { background:rgba(124,58,237,.1); color:var(--accent2); border:1px solid rgba(124,58,237,.2); }
.mmb-genius { background:rgba(244,114,182,.1); color:var(--pink); border:1px solid rgba(244,114,182,.2); }
.routing-chip {
  display:flex; align-items:center; gap:5px; padding:3px 8px;
  background:var(--bg); border:1px solid var(--border); border-radius:4px;
  font-size:10.5px; color:var(--muted); margin-bottom:5px; width:fit-content;
}
.routing-chip .rc-local { color:var(--green); font-weight:700; }
.routing-chip .rc-cloud { color:var(--accent2); font-weight:700; }

/* ── Token savings bar ── */
.savings-bar {
  display:flex; align-items:center; gap:8px; padding:5px 12px;
  background:rgba(16,185,129,.05); border-bottom:1px solid rgba(16,185,129,.15);
  font-size:11px; flex-shrink:0;
}
.sb-saved { color:var(--green); font-weight:700; display:flex; align-items:center; gap:4px; }
.sb-track { flex:1; height:4px; background:var(--s4); border-radius:2px; overflow:hidden; }
.sb-fill  { height:100%; background:var(--green); border-radius:2px; transition:width .6s ease; }
.sb-label { color:var(--muted); font-size:10.5px; }

/* ── Setup wizard ── */
.setup-modal { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:400; display:flex; align-items:center; justify-content:center; }
.setup-card {
  background:var(--s1); border:1px solid var(--border); border-radius:14px;
  width:480px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,.7);
  animation:popUp .2s ease;
}
.setup-header { background:var(--s2); padding:20px 24px; border-bottom:1px solid var(--border); }
.setup-header h2 { font-size:16px; font-weight:700; margin-bottom:4px; }
.setup-header p  { font-size:12.5px; color:var(--muted); line-height:1.6; }
.setup-steps { padding:20px 24px; display:flex; flex-direction:column; gap:14px; }
.setup-step {
  display:flex; gap:14px; align-items:flex-start;
  padding:12px 14px; border-radius:8px; border:1px solid var(--border);
  background:var(--s2); transition:all .2s;
}
.setup-step.done  { border-color:rgba(16,185,129,.4); background:rgba(16,185,129,.05); }
.setup-step.active{ border-color:rgba(124,58,237,.4); background:var(--aglow); }
.step-num {
  width:26px; height:26px; border-radius:50%; display:flex; align-items:center;
  justify-content:center; font-size:11px; font-weight:800; flex-shrink:0;
  border:2px solid var(--border); color:var(--muted); background:var(--s3);
}
.setup-step.done  .step-num { background:var(--green); border-color:var(--green); color:#fff; }
.setup-step.active .step-num { background:var(--accent); border-color:var(--accent); color:#fff; }
.step-content { flex:1; }
.step-title { font-size:13px; font-weight:600; margin-bottom:3px; }
.step-desc  { font-size:11.5px; color:var(--muted); line-height:1.5; }
.step-action { margin-top:8px; display:flex; gap:6px; align-items:center; }
.step-btn {
  padding:5px 14px; border-radius:6px; font-size:12px; font-weight:600;
  cursor:pointer; transition:all .15s; border:none;
}
.step-btn-primary { background:var(--accent); color:#fff; }
.step-btn-primary:hover { background:var(--accent2); }
.step-btn-secondary { background:var(--s4); color:var(--muted); border:1px solid var(--border); }
.step-btn-secondary:hover { color:var(--text); }
.step-progress { font-size:11px; color:var(--amber); display:flex; align-items:center; gap:5px; animation:pulse 1s infinite; }
.step-done-label { font-size:11px; color:var(--green); display:flex; align-items:center; gap:4px; font-weight:600; }
.setup-footer { padding:14px 24px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.auto-badge {
  display:inline-flex; align-items:center; gap:5px; padding:3px 10px;
  background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3);
  border-radius:5px; font-size:11px; font-weight:700; color:var(--green);
}


/* ── Sidebar collapse / resize ── */
.sidebar { transition: width .2s ease; }
.sidebar.collapsed { width:0; min-width:0; overflow:hidden; border:none; }
.sidebar-resize {
  width:4px; cursor:col-resize; background:transparent; flex-shrink:0;
  transition:background .15s; z-index:10;
}
.sidebar-resize:hover { background:var(--accent); opacity:.6; }


/* ── Command palette ── */
.palette-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:500;
  display:flex; align-items:flex-start; justify-content:center; padding-top:15vh;
}
.palette-box {
  width:520px; background:var(--s2); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; box-shadow:0 12px 48px rgba(0,0,0,.7);
  animation:popUp .15s ease;
}
.palette-input-row {
  display:flex; align-items:center; gap:10px; padding:12px 16px;
  border-bottom:1px solid var(--border);
}
.palette-input {
  flex:1; background:transparent; border:none; color:var(--text);
  font-size:14px; outline:none; font-family:var(--ui);
}
.palette-input::placeholder { color:var(--muted2); }
.palette-results { max-height:340px; overflow-y:auto; }
.palette-section-label {
  padding:6px 16px 3px; font-size:10px; font-weight:700;
  letter-spacing:.8px; text-transform:uppercase; color:var(--muted2);
}
.palette-item {
  display:flex; align-items:center; gap:10px; padding:8px 16px;
  cursor:pointer; transition:background .1s; font-size:13px;
}
.palette-item:hover, .palette-item.sel { background:var(--aglow); }
.palette-item .pi-icon { color:var(--muted); display:flex; flex-shrink:0; }
.palette-item .pi-label { flex:1; }
.palette-item .pi-hint { font-size:11px; color:var(--muted2); font-family:var(--mono); }
.palette-item .pi-badge { font-size:10px; background:var(--s4); border:1px solid var(--border); padding:1px 6px; border-radius:3px; color:var(--muted); }
.palette-footer {
  display:flex; align-items:center; gap:12px; padding:7px 16px;
  border-top:1px solid var(--border); font-size:10.5px; color:var(--muted2);
}
.palette-footer kbd { background:var(--s4); border:1px solid var(--border); padding:1px 5px; border-radius:3px; font-family:var(--mono); font-size:10px; color:var(--text); }

/* ── Context menu ── */
.ctx-menu { position:fixed; z-index:9000; background:var(--s2); border:1px solid var(--border); border-radius:7px; padding:4px; min-width:160px; box-shadow:0 8px 32px rgba(0,0,0,.55); }
.ctx-item { display:flex; align-items:center; gap:8px; padding:6px 10px; border-radius:5px; font-size:12px; cursor:pointer; color:var(--text); transition:background .1s; }
.ctx-item:hover { background:rgba(124,58,237,.18); }
.ctx-item.danger:hover { background:rgba(239,68,68,.15); color:var(--red); }
.ctx-sep { height:1px; background:var(--border); margin:3px 0; }

/* ── Find in files ── */
.search-result-file { font-size:11px; color:var(--accent2); font-family:var(--mono); padding:6px 10px 2px; font-weight:600; }
.search-result-line { display:flex; gap:8px; padding:3px 10px 3px 20px; cursor:pointer; border-radius:4px; font-size:11px; }
.search-result-line:hover { background:rgba(124,58,237,.12); }
.search-result-line .srl-num { color:var(--muted2); font-family:var(--mono); flex-shrink:0; min-width:28px; text-align:right; }
.search-result-line .srl-text { color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:var(--mono); }
.search-input-wrap { padding:8px; border-bottom:1px solid var(--border); }
.search-input { width:100%; background:var(--s3); border:1px solid var(--border); color:var(--text); padding:6px 10px; border-radius:6px; font-size:12px; font-family:var(--mono); outline:none; box-sizing:border-box; }
.search-input:focus { border-color:var(--accent); }



/* ── Real terminal ── */
.term-input-row {
  display:flex; align-items:center; gap:8px; padding:4px 12px 8px;
  flex-shrink:0; border-top:1px solid var(--border);
}
.term-input {
  flex:1; background:transparent; border:none; color:var(--text);
  font-family:var(--mono); font-size:12px; outline:none; caret-color:var(--accent2);
}
.term-input::placeholder { color:var(--muted2); }
.term-line { display:flex; gap:8px; font-family:var(--mono); font-size:12px; line-height:1.65; flex-wrap:wrap; }
.term-line.clickable { cursor:pointer; }
.term-line.clickable:hover .term-cmd { text-decoration:underline; }
.term-spinner { display:inline-block; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }


/* ── Choko companion toast ── */
.choko-toast {
  position:fixed; bottom:88px; right:20px; z-index:200;
  display:flex; align-items:flex-end; gap:10px;
  animation:choko-in .35s cubic-bezier(.34,1.56,.64,1);
  pointer-events:all;
}
.choko-toast.choko-out { animation:choko-out .25s ease forwards; }
@keyframes choko-in {
  from { opacity:0; transform:translateY(20px) scale(.88); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}
@keyframes choko-out {
  to { opacity:0; transform:translateY(16px) scale(.92); }
}
.choko-avatar {
  width:56px; height:56px; flex-shrink:0; cursor:pointer;
  filter:drop-shadow(0 4px 12px rgba(244,114,182,.4));
  transition:transform .2s;
  user-select:none;
}
.choko-avatar:hover { transform:scale(1.08) rotate(-3deg); }
.choko-bubble {
  background:#1a0f2e;
  border:1.5px solid rgba(244,114,182,.5);
  border-radius:14px 14px 14px 2px;
  padding:10px 14px; max-width:220px; min-width:140px;
  box-shadow:0 4px 24px rgba(244,114,182,.18),0 2px 8px rgba(0,0,0,.4);
  position:relative;
}
.choko-bubble::before {
  content:''; position:absolute; bottom:10px; left:-8px;
  border:5px solid transparent;
  border-right-color:rgba(244,114,182,.5);
}
.choko-bubble::after {
  content:''; position:absolute; bottom:11px; left:-6px;
  border:4px solid transparent;
  border-right-color:#1a0f2e;
}
.choko-name {
  font-size:10px; font-weight:800; letter-spacing:.8px;
  color:var(--pink); text-transform:uppercase; margin-bottom:4px;
  display:flex; align-items:center; gap:5px;
}
.choko-name .cn-dot { width:5px; height:5px; border-radius:50%; background:var(--pink); animation:pulse 1.5s infinite; }
.choko-msg { font-size:12.5px; color:#e8d5f5; line-height:1.55; }

function Icon({ name, size }) {
  const el = ICONS[name];
  if (!el) return null;
  if (!size) return el;
  return React.cloneElement(el, { width:size, height:size });
}

function fileIcon(name) {
  const ext = name.split('.').pop();
  if (['ts','tsx'].includes(ext)) return ICONS.ts;
  if (ext === 'json') return ICONS.json;
  if (ext === 'md')   return ICONS.md;
  if (name === 'package.json') return ICONS.pkg;
  if (ext === 'env')  return ICONS.key;
  return ICONS.file;
}

// ── Syntax highlighting ───────────────────────────────────────
function syntaxHL(code, lang) {
  lang = lang || '';
  var esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  var jsLangs = ['ts','tsx','js','jsx','typescript','javascript'];
  if (jsLangs.indexOf(lang) !== -1) {
    var src = esc, out = '', i = 0;
    var KWS = 'const,let,var,function,class,return,import,export,from,if,else,for,while,async,await,new,typeof,interface,type,extends,implements,null,undefined,true,false,void,enum,readonly,public,private,protected,static,abstract'.split(',');
    while (i < src.length) {
      var ch = src[i];
      if (ch==='/' && src[i+1]==='/') {
        var e1=src.indexOf('\n',i); if(e1<0) e1=src.length;
        out+='<span class="t-cmt">'+src.slice(i,e1)+'</span>'; i=e1; continue;
      }
      if (ch==='/' && src[i+1]==='*') {
        var e2=src.indexOf('*/',i+2); if(e2<0) e2=src.length-2;
        out+='<span class="t-cmt">'+src.slice(i,e2+2)+'</span>'; i=e2+2; continue;
      }
      if (ch==='"') {
        var j=i+1; while(j<src.length && src[j]!=='"'){if(src[j]==='\\'){j+=2;}else{j++;}} j++;
        out+='<span class="t-str">'+src.slice(i,j)+'</span>'; i=j; continue;
      }
      if (ch==="'") {
        var k=i+1; while(k<src.length && src[k]!=="'"){if(src[k]==='\\'){k+=2;}else{k++;}} k++;
        out+='<span class="t-str">'+src.slice(i,k)+'</span>'; i=k; continue;
      }
      var prev = i>0 && /[a-zA-Z0-9_$]/.test(src[i-1]);
      if (!prev && /[a-zA-Z_$]/.test(ch)) {
        var m=i; while(m<src.length && /[a-zA-Z0-9_$]/.test(src[m])) m++;
        var next = m<src.length && /[a-zA-Z0-9_$]/.test(src[m]);
        var word=src.slice(i,m);
        if (!next && KWS.indexOf(word)!==-1) { out+='<span class="t-kw">'+word+'</span>'; i=m; continue; }
        if (!next && /^[A-Z]/.test(word)) { out+='<span class="t-type">'+word+'</span>'; i=m; continue; }
        out+=word; i=m; continue;
      }
      if (/[0-9]/.test(ch) && (i===0||!/[a-zA-Z_$]/.test(src[i-1]))) {
        var n=i; while(n<src.length && /[0-9.]/.test(src[n])) n++;
        out+='<span class="t-num">'+src.slice(i,n)+'</span>'; i=n; continue;
      }
      out+=ch; i++;
    }
    return out;
  }
  if (lang==='json') {
    return esc
      .replace(/"([^"\\]|\\.)*"(\s*):/g,function(m){var ci=m.lastIndexOf('"')+1;return '<span class="t-prop">'+m.slice(0,ci)+'</span>'+m.slice(ci);})
      .replace(/"([^"\\]|\\.)*"/g,function(m){return '<span class="t-str">'+m+'</span>';})
      .replace(/\b(true|false|null)\b/g,'<span class="t-kw">$1</span>')
      .replace(/\b(\d+\.?\d*)\b/g,'<span class="t-num">$1</span>');
  }
  return esc;
}

function ToolCallBlock({ line, state }) {
  const m = line.match(/^TOOL:([^:]+):([^:]+)(?::(.+))?$/);
  if (!m) return null;
  const [, toolName, action, rawParams] = m;
  const meta = TOOL_META[`${toolName}:${action}`] || { icon:'⚙', verb:action, color:'var(--muted)' };
  let paramText = '';
  let filePath = '';
  if (rawParams) {
    try {
      const p = JSON.parse(rawParams);
      filePath = p.filePath || p.path || '';
      paramText = filePath || p.command || p.query || p.title || p.url || String(Object.values(p)[0]||'');
    } catch { paramText = rawParams.slice(0,80); }
  }
  const isRunning = state === 'running';
  const isFileOp = toolName==='file' && ['read','write','replace'].includes(action) && filePath;
  const handleClick = isFileOp ? ()=>{
    const fp = filePath.replace(/\\/g,'/');
    const name = fp.split('/').pop();
    window.maxOpenFile?.({name, path:fp});
  } : undefined;
  return (
    <div className={`tcb ${isRunning?'tcb-running':state==='error'?'tcb-error':'tcb-done'}`}
      onClick={handleClick} style={isFileOp?{cursor:'pointer'}:{}}>
      <span className="tcb-icon">{meta.icon}</span>
      <span className="tcb-verb" style={{color:meta.color}}>{meta.verb}</span>
      {paramText && <span className="tcb-param">{paramText}</span>}
      <span className="tcb-state">
        {isRunning
          ? <><span className="tcb-spinner">⟳</span><span style={{color:'var(--muted)',fontSize:10,marginLeft:3}}>running</span></>
          : <span style={{color:'var(--green)'}}>✓</span>
        }
      </span>
    </div>
  );
}

// ── Markdown renderer ─────────────────────────────────────────
function MdBlock({ text }) {
  const parts = text.split(/(```(?:\w+)?\n[\s\S]*?```)/g);
  return (
    <>
      {parts.map((part, i) => {
        const m = part.match(/^```(\w*)\n([\s\S]*)```$/);
        if (m) return (
          <pre key={i} style={{marginTop:6,marginBottom:6}}>
            <code dangerouslySetInnerHTML={{ __html: syntaxHL(m[2], m[1]) }} />
          </pre>
        );
        const html = part
          .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
          .replace(/\*(.+?)\*/g,'<em>$1</em>')
          .replace(/`([^`\n]+)`/g,'<code>$1</code>')
          .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:var(--accent2)">$1</a>')
          .replace(/^### (.+)$/gm,'<h4 style="margin:8px 0 2px;font-size:12px;color:var(--text)">$1</h4>')
          .replace(/^## (.+)$/gm,'<h3 style="margin:8px 0 3px;font-size:13px;font-weight:600">$1</h3>')
          .replace(/^# (.+)$/gm,'<h2 style="margin:8px 0 4px;font-size:14px;font-weight:700">$1</h2>')
          .replace(/^(\d+\.) (.+)$/gm,'<li data-ol>$2</li>')
          .replace(/^[-*] (.+)$/gm,'<li>$1</li>')
          .replace(/(<li[^>]*>[\s\S]*?<\/li>(\n|$))+/g, s => {
            const isOl = s.includes('data-ol');
            const tag = isOl ? 'ol' : 'ul';
            const items = s.replace(/ data-ol/g,'');
            return `<${tag} style="margin:4px 0 4px 16px;padding:0">${items}</${tag}>`;
          })
          .replace(/\n{2,}/g,'<br/><br/>')
          .replace(/\n/g,'<br/>');
        return <div key={i} dangerouslySetInnerHTML={{ __html: html }} />;
      })}
    </>
  );
}

function MdContent({ text, isStreaming }) {
  const lines = (text||'').split('\n');
  const segments = [];
  let buf = [];
  for (const line of lines) {
    if (/^TOOL:[a-zA-Z_]+:[a-zA-Z_]+/.test(line.trim())) {
      if (buf.length) { segments.push({ type:'text', content:buf.join('\n') }); buf=[]; }
      segments.push({ type:'tool', line:line.trim() });
    } else { buf.push(line); }
  }
  if (buf.length) segments.push({ type:'text', content:buf.join('\n') });
  const lastToolIdx = segments.reduce((acc,s,i)=>s.type==='tool'?i:acc,-1);
  return (
    <>
      {segments.map((seg,i)=>{
        if (seg.type==='tool') {
          const state = isStreaming && i===lastToolIdx ? 'running' : 'done';
          return <ToolCallBlock key={i} line={seg.line} state={state}/>;
        }
        return seg.content.trim() ? <MdBlock key={i} text={seg.content}/> : null;
      })}
    </>
  );
}

// ── Tool chip ─────────────────────────────────────────────────
function ToolChip({ t, pendingChanges, setPendingChanges, setActiveTab }) {
  const ic = t.icon === 'write' ? ICONS.file : ICONS.terminal;
  const isWrite = t.icon === 'write';
  const pending = isWrite ? pendingChanges.find(p => p.file === t.label || p.file === ('src/'+t.label)) : null;
  const status = pending?.status;

  const accept = async (e) => {
    e.stopPropagation();
    if (!pending) return;
    setPendingChanges(ps => ps.map(p => p.id === pending.id ? {...p, status:'accepting'} : p));
    playAccept();
    const fname = t.label.split('/').pop();
    try {
      const content = pending.content || '';
      const r = await fetch(window.MAX_URL + '/api/tools/file/write', {
        method: 'POST', headers: authHdrs(),
        body: JSON.stringify({ filePath: t.label, content })
      });
      setPendingChanges(ps => ps.map(p => p.id === pending.id ? {...p, status:'accepted'} : p));
    } catch {
      setPendingChanges(ps => ps.map(p => p.id === pending.id ? {...p, status:'accepted'} : p));
    }
    if (setActiveTab) setActiveTab(fname);
  };
  const reject = (e) => {
    e.stopPropagation();
    playReject();
    setPendingChanges(ps => ps.map(p => p.id === pending.id ? {...p, status:'rejected'} : p));
  };

  return (
    <div className="tool-call" style={status==='rejected'?{opacity:.45}:{}}>
      <span className="tc-icon" style={{display:'flex',alignItems:'center'}}>{ic}</span>
      <span style={{color:'var(--muted)',fontSize:10,letterSpacing:.5,textTransform:'uppercase'}}>{t.action}</span>
      <span className="tc-path">{t.label}</span>
      {isWrite && !status && t.ok && <span className="tc-ok" style={{display:'flex',alignItems:'center'}}>{ICONS.check}</span>}
      {isWrite && status === 'pending' && (
        <div className="tc-actions">
          <button className="tc-accept" title="View diff" onClick={async e=>{
            e.stopPropagation();
            if(!window.__showDiff) return;
            let original='';
            try{
              const r=await fetch(window.MAX_URL+'/api/tools/file/read',{method:'POST',headers:authHdrs(),body:JSON.stringify({filePath:t.label})});
              const d=await r.json(); original=d.content||d.result||d.text||'';
            }catch{}
            window.__showDiff({fileName:t.label.split('/').pop(),original,modified:pending?.content||'',pendingId:pending?.id});
          }} style={{fontSize:10,width:'auto',padding:'0 5px',color:'var(--blue)',background:'rgba(96,165,250,.1)',border:'1px solid rgba(96,165,250,.3)'}}>diff</button>
          <button className="tc-accept" title="Accept change" onClick={accept}>{ICONS.check}</button>
          <button className="tc-reject" title="Reject change" onClick={reject}>{ICONS.close}</button>
        </div>
      )}
      {isWrite && status === 'accepted' && <span className="tc-accepted">{ICONS.check} accepted</span>}
      {isWrite && status === 'rejected' && <span className="tc-rejected">rejected</span>}
      {!isWrite && <span className="tc-ok" style={{display:'flex',alignItems:'center'}}>{ICONS.check}</span>}
    </div>
  );
}

  if (!id || id < 1000000000000) return '';
  const d = new Date(id);
  return d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

const DEVICES = [
  { id:'desktop', label:'Desktop', w:null, h:null, icon:ICONS.desktop },
  { id:'tablet',  label:'Tablet',  w:768,  h:1024, icon:ICONS.tablet  },

];

function PreviewPane() {
  const [device, setDevice] = useState('desktop');
  const [url, setUrl] = useState(()=>localStorage.getItem('mx_preview_url')||'http://localhost:3000');
  const [inputUrl, setInputUrl] = useState(()=>localStorage.getItem('mx_preview_url')||'http://localhost:3000');
  const [serverUp, setServerUp] = useState(false);
  // 'idle' | 'detecting' | 'starting' | 'waiting' | 'error'
  const [launchState, setLaunchState] = useState('idle');
  const [launchCmd, setLaunchCmd] = useState('npm run dev');
  const [launchLog, setLaunchLog] = useState('');
  const iframeRef = useRef(null);
  const autoTriggered = useRef(false);
  const d = DEVICES.find(x=>x.id===device);

  // Poll the target URL every 2s while waiting for it to come up
  useEffect(()=>{
    let mounted=true;
    const check=async()=>{
      try{
        await fetch(url,{mode:'no-cors',signal:AbortSignal.timeout(1500)});
        if(mounted){ setServerUp(true); setLaunchState('idle'); }
      } catch{
        if(mounted) setServerUp(false);
      }
    };
    check();
    const interval = launchState==='waiting' ? 2000 : 5000;
    const t=setInterval(check,interval);
    return ()=>{mounted=false;clearInterval(t);};
  },[url, launchState]);

  // Auto-detect & start dev server when preview first opens and server is down
  useEffect(()=>{
    if(autoTriggered.current || serverUp) return;
    autoTriggered.current = true;
    const timer = setTimeout(()=>{
      if(!serverUp) autoLaunch();
    }, 1800);
    return ()=>clearTimeout(timer);
  // eslint-disable-next-line react-hooks/exhaustive-deps
  },[]);

  const detectDevCmd = async () => {
    // Ask MAX to check for package.json and figure out the right start command
    const maxBase = window.MAX_URL || 'http://localhost:3100';
    try {
      const r = await fetch(`${maxBase}/api/tools/shell/run`, {
        method:'POST', headers:authHdrs(),
        body: JSON.stringify({ command: 'node -e "try{const p=require(\'./package.json\');const s=p.scripts||{};console.log(s.dev?\'dev\':s.start?\'start\':s[\'dev:start\']?\'dev:start\':\'\');}catch{console.log(\'\');}"', timeoutMs:5000 })
      });
      const d = await r.json();
      const script = (d.stdout||'').trim();
      if (script) return `npm run ${script}`;
    } catch {}
    return 'npm run dev';
  };

  const autoLaunch = async () => {
    const maxBase = window.MAX_URL || 'http://localhost:3100';
    setLaunchState('detecting');
    setLaunchLog('Detecting dev script…');
    const cmd = await detectDevCmd();
    setLaunchCmd(cmd);
    setLaunchState('starting');
    setLaunchLog(`Starting: ${cmd}`);
    try {
      const r = await fetch(`${maxBase}/api/tools/shell/start`, {
        method:'POST', headers:authHdrs(),
        body: JSON.stringify({ command: cmd, name: 'dev-server' })
      });
      const result = await r.json();
      if (result.success || result.pid) {
        setLaunchState('waiting');
        setLaunchLog(`Server starting (pid ${result.pid})… waiting for ${url}`);
      } else {
        setLaunchState('error');
        setLaunchLog(result.error || 'Failed to start dev server');
      }
    } catch(err) {
      setLaunchState('error');
      setLaunchLog(err.message);
    }
  };

  const navigate=()=>{setUrl(inputUrl);localStorage.setItem('mx_preview_url',inputUrl);};
  const reload=()=>{ if(iframeRef.current) iframeRef.current.src=url; };
  const iframeH = device==='desktop' ? 520 : d.h;
  const wrapStyle = device==='desktop'
    ? {width:'100%',height:'100%',minHeight:480,display:'flex',flexDirection:'column'}
    : {width:d.w,flexShrink:0,display:'flex',flexDirection:'column'};

  const launchBusy = launchState==='detecting'||launchState==='starting'||launchState==='waiting';

  return (
    <div style={{display:'flex',flexDirection:'column',flex:1,overflow:'hidden'}}>
      <div className="preview-toolbar">
        <button className="preview-nav-btn" onClick={()=>iframeRef.current?.contentWindow?.history.back()}>{ICONS.back}</button>
        <button className="preview-nav-btn" onClick={()=>iframeRef.current?.contentWindow?.history.forward()}>{ICONS.forward}</button>
        <button className="preview-nav-btn" onClick={reload}>{ICONS.reload}</button>
        <form onSubmit={e=>{e.preventDefault();navigate();}} style={{flex:1,display:'flex',maxWidth:340}}>
          <input className="preview-url-bar" value={inputUrl} onChange={e=>setInputUrl(e.target.value)} onFocus={e=>e.target.select()} style={{width:'100%'}}/>
        </form>
        <div style={{display:'flex',alignItems:'center',gap:5,fontSize:11}}>
          <div style={{width:6,height:6,borderRadius:'50%',background:serverUp?'var(--green)':launchBusy?'var(--amber)':'var(--muted2)',flexShrink:0,
            ...(launchBusy?{animation:'pulse 1.2s infinite'}:{})}}/>
          <span style={{color:serverUp?'var(--green)':launchBusy?'var(--amber)':'var(--muted2)'}}>
            {serverUp?'live':launchState==='waiting'?'starting…':launchBusy?launchState:'offline'}
          </span>
        </div>
        <div className="device-group">
          {DEVICES.map(dv=>(
            <button key={dv.id} className={`device-btn ${device===dv.id?'active':''}`} onClick={()=>setDevice(dv.id)}>
              {dv.icon} {dv.label}
            </button>
          ))}
        </div>
      </div>
      <div className="preview-stage">
        <div className="preview-device-wrap" style={wrapStyle}>
          {device!=='desktop' && (
            <div className="browser-chrome">
              <div className="bc-dots">
                <div className="bc-dot" style={{background:'#ef4444'}}/><div className="bc-dot" style={{background:'#f59e0b'}}/><div className="bc-dot" style={{background:'#10b981'}}/>
              </div>
              <div className="bc-bar">{url}</div>
              <button className="preview-nav-btn" onClick={reload}>{ICONS.reload}</button>
            </div>
          )}
          <div className="preview-iframe-wrap" style={{height:iframeH,borderRadius:device!=='desktop'?'0 0 10px 10px':'0'}}>
            {serverUp ? (
              <iframe ref={iframeRef} className="preview-iframe" src={url} style={{height:iframeH}} title="Preview" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"/>
            ) : (
              <div className="preview-no-server">
                <div style={{opacity:.25,display:'flex'}}>{ICONS.desktop}</div>
                {launchBusy ? (
                  <>
                    <div className="pns-title" style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{display:'inline-block',animation:'tcb-spin .9s linear infinite',fontSize:16}}>⟳</span>
                      {launchState==='detecting'?'Detecting dev server…':launchState==='starting'?'Launching dev server…':'Waiting for server…'}
                    </div>
                    <div className="pns-cmd"><span style={{color:'var(--accent2)'}}>❯</span><span>{launchCmd}</span></div>
                    <div className="pns-hint" style={{color:'var(--muted)',fontSize:11,marginTop:4}}>{launchLog}</div>
                  </>
                ) : (
                  <>
                    <div className="pns-title">{launchState==='error'?'Failed to start dev server':`No server at ${url}`}</div>
                    {launchState==='error' && <div className="pns-hint" style={{color:'var(--red)',fontSize:11,marginBottom:8}}>{launchLog}</div>}
                    <div className="pns-cmd"><span style={{color:'var(--accent2)'}}>❯</span><span>{launchCmd}</span></div>
                    <div className="pns-hint">Maxwell will auto-start your dev server.<br/>Click below to retry.</div>
                    <button className="preview-reload-btn" onClick={()=>{autoTriggered.current=false;autoLaunch();}}>
                      {launchState==='error'?'Retry Launch':'Launch Dev Server'}
                    </button>
                  </>
                )}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// Auto-detect API provider from key prefix
function detectProvider(key) {
  const k = key.trim();
  if (k.startsWith('sk-ant-'))           return 'anthropic';
  if (k.startsWith('sk-proj-'))          return 'openai';
  if (k.startsWith('AIza'))              return 'google';
  if (k.startsWith('sk-') && k.length > 40) return 'deepseek'; // fallback: most sk- that aren't openai
  if (k.startsWith('gsk_'))              return 'groq';
  if (k.startsWith('xai-'))              return 'xai';
  if (k.startsWith('sk-') && k.length <= 56) return 'openai';
  return null;
}

// ── Task complexity classifier ────────────────────────────────
function classifyTask(text) {
  const t = text.toLowerCase();
  const simpleKws = ['what is','what are','explain','how does','list','show','tell me','hi','hello','thanks','what version','status','help'];
  const complexKws = ['build','implement','create','write','refactor','fix','debug','add','migrate','deploy','test','generate','architect','optimize','scale'];
  if (simpleKws.some(k => t.includes(k))) return 'local';
  if (complexKws.some(k => t.includes(k))) return 'cloud';
  if (text.length < 60) return 'local';
  return 'cloud';
}

// Resolve selectedOption → { tier, model } for the API call
function resolveModelChoice(selectedOption, messageText) {
  if (selectedOption.startsWith('auto:')) {
    const band = selectedOption.split(':')[1]; // fast | smart | genius
    if (band === 'genius') return { tier: 'genius', model: undefined };
    // For fast/smart, classify the message — can downgrade fast→fast, smart can also go fast for trivial
    const complexity = classifyTask(messageText);
    const tier = (band === 'smart' && complexity === 'cloud') ? 'smart'
               : (band === 'smart') ? 'fast'
               : 'fast';
    return { tier, model: undefined };
  }
  const opt = getOptionById(selectedOption);
  return { tier: opt.tier, model: selectedOption };
}

function modelBadgeClass(tier) {
  if (tier === 'fast')   return 'mmb-local';
  if (tier === 'genius') return 'mmb-genius';
  return 'mmb-cloud';
}

function modelBadgeLabel(tier, optionId) {
  const opt = getOptionById(optionId || '');
  if (tier === 'fast') return '⚡ local';
  return (opt?.icon || '◎') + ' ' + (opt?.label || tier);
}

// ── Setup Wizard ──────────────────────────────────────────────
function SetupWizard({ onDismiss }) {
  const [step, setStep] = React.useState(0);
  const [ollamaStatus, setOllamaStatus] = React.useState('checking'); // checking|missing|installed
  const [pulling, setPulling] = React.useState(false);
  const [pulled, setPulled] = React.useState(false);
  const [pullProgress, setPullProgress] = React.useState('');

  React.useEffect(() => {
    fetch('http://localhost:11434/api/tags', { signal: AbortSignal.timeout(2000) })
      .then(r => r.ok ? setOllamaStatus('installed') : setOllamaStatus('missing'))
      .catch(() => setOllamaStatus('missing'));
  }, []);

  React.useEffect(() => {
    if (ollamaStatus === 'installed' && step === 0) setStep(1);
  }, [ollamaStatus]);

  const pullModel = async () => {
    setPulling(true); setPullProgress('Starting download…');
    try {
      const r = await fetch('http://localhost:11434/api/pull', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: 'qwen3:1.5b', stream: true })
      });
      const reader = r.body.getReader();
      const dec = new TextDecoder();
      let buf = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += dec.decode(value, { stream: true });
        const lines = buf.split('\n'); buf = lines.pop();
        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const ev = JSON.parse(line);
            if (ev.total && ev.completed) {
              const pct = Math.round((ev.completed / ev.total) * 100);
              setPullProgress(`${ev.status || 'pulling'} ${pct}%`);
            } else if (ev.status) {
              setPullProgress(ev.status);
              if (ev.status === 'success') { setPulled(true); setStep(2); break; }
            }
          } catch {}
        }
      }
      setPulled(true); setStep(2);
    } catch (e) {
      setPullProgress('Error: ' + e.message + ' — check Ollama is running');
    } finally {
      setPulling(false);
    }
  };

  const steps = [
    {
      title: 'Install Ollama',
      desc: 'Ollama runs AI models locally on your machine — free, private, no API key needed. Required for the local fast tier.',
      action: ollamaStatus === 'installed' ? null : (
        <div className="step-action">
          <a href="https://ollama.com/download" target="_blank" rel="noopener"><button className="step-btn step-btn-primary">Download Ollama ↗</button></a>
          <button className="step-btn step-btn-secondary" onClick={() => { setOllamaStatus('installed'); setStep(1); }}>Already installed</button>
        </div>
      ),
      status: ollamaStatus === 'installed' ? 'done' : step === 0 ? 'active' : 'pending',
      doneLabel: 'Ollama detected at localhost:11434',
    },
    {
      title: 'Pull recommended model',
      desc: 'qwen3:1.5b is a fast, capable 1GB model — handles everyday tasks instantly with zero token cost.',
      action: step >= 1 && !pulled ? (
        <div className="step-action">
          {pulling
            ? <div className="step-progress">◎ {pullProgress || 'Pulling qwen3:1.5b…'}</div>
            : <button className="step-btn step-btn-primary" onClick={pullModel}>Pull qwen3:1.5b</button>}
          <span style={{fontSize:11,color:'var(--muted)'}}>~1 GB download</span>
        </div>
      ) : null,
      status: pulled ? 'done' : step === 1 ? 'active' : 'pending',
      doneLabel: 'qwen3:1.5b ready',
    },
    {
      title: 'Start saving tokens',
      desc: 'Auto-route mode is now active. Simple questions and tasks run locally for free. Complex coding uses your cloud API.',
      action: step === 2 ? (
        <div className="step-action">
          <div className="auto-badge">🔄 Auto-route enabled</div>
        </div>
      ) : null,
      status: step === 2 ? 'done' : 'pending',
      doneLabel: 'Auto-routing active',
    },
  ];

  return (
    <div className="setup-modal">
      <div className="setup-card">
        <div className="setup-header">
          <h2>⚡ Set up local AI</h2>
          <p>Maxwell uses a local model for everyday tasks — saving your cloud API credits for complex work. Setup takes about 2 minutes.</p>
        </div>
        <div className="setup-steps">
          {steps.map((s, i) => (
            <div key={i} className={`setup-step ${s.status}`}>
              <div className="step-num">{s.status === 'done' ? '✓' : i + 1}</div>
              <div className="step-content">
                <div className="step-title">{s.title}</div>
                <div className="step-desc">{s.desc}</div>
                {s.status === 'done' && <div className="step-done-label" style={{marginTop:5}}>✓ {s.doneLabel}</div>}
                {s.action}
              </div>
            </div>
          ))}
        </div>
        <div className="setup-footer">
          <span style={{fontSize:11.5,color:'var(--muted)'}}>
            {step < 2 ? 'You can skip this and configure later in Settings → Models' : 'All set! Refresh anytime in Settings → Models'}
          </span>
          <button className="step-btn step-btn-secondary" onClick={onDismiss}>
            {step === 2 ? 'Done' : 'Skip for now'}
          </button>
        </div>
      </div>
    </div>
  );
}

const PALETTE_CMDS = [
  { type:'cmd', icon:'bolt',     label:'/swarm',   hint:'Parallel swarm job',       action:'swarm'   },
  { type:'cmd', icon:'warning',  label:'/debate',  hint:'Adversarial debate',        action:'debate'  },

  { type:'cmd', icon:'target',   label:'/goals',   hint:'List active goals',         action:'goals'   },
  { type:'cmd', icon:'terminal', label:'/status',  hint:'Full internal state',       action:'status'  },
  { type:'cmd', icon:'search',   label:'/inspect', hint:'Scan TODOs/FIXMEs',        action:'inspect' },
];

function CommandPalette({ files, onOpenFile, onRunCmd, onClose }) {
  const [q, setQ] = React.useState('');
  const [selIdx, setSelIdx] = React.useState(0);
  const inputRef = React.useRef(null);
  React.useEffect(()=>{ inputRef.current?.focus(); }, []);

  const flatAll = (arr) => (arr||[]).flatMap(f => f.type==='dir' ? flatAll(f.children||[]) : [f]);
  const allFiles = flatAll(files);
  const fileItems = allFiles
    .filter(f => !q || f.name.toLowerCase().includes(q.toLowerCase()))
    .map(f => ({ type:'file', icon:'file', label:f.name, f }));
  const cmdItems = PALETTE_CMDS
    .filter(c => !q || c.label.includes(q.toLowerCase()) || c.hint.toLowerCase().includes(q.toLowerCase()));
  const allItems = [...fileItems, ...cmdItems];

  const onKey = e => {
    if (e.key==='ArrowDown'){ e.preventDefault(); setSelIdx(i=>Math.min(i+1,allItems.length-1)); }
    if (e.key==='ArrowUp')  { e.preventDefault(); setSelIdx(i=>Math.max(i-1,0)); }
    if (e.key==='Escape') onClose();
    if (e.key==='Enter') { e.preventDefault(); pick(allItems[selIdx]); }
  };

  const pick = item => {
    if (!item) return;
    if (item.type==='file') onOpenFile(item.f);
    else onRunCmd(item.action);
    onClose();
  };

  return (
    <div className="palette-overlay" onClick={onClose}>
      <div className="palette-box" onClick={e=>e.stopPropagation()}>
        <div className="palette-input-row">
          <span style={{display:'flex',color:'var(--muted)'}}>{ICONS.search}</span>
          <input ref={inputRef} className="palette-input" placeholder="Search files, run commands…"
            value={q} onChange={e=>{setQ(e.target.value);setSelIdx(0);}} onKeyDown={onKey}/>
          <span style={{fontSize:11,color:'var(--muted2)',fontFamily:'var(--mono)'}}>Esc</span>
        </div>
        <div className="palette-results">
          {fileItems.length>0 && <>
            <div className="palette-section-label">Files</div>
            {fileItems.map((item,i)=>(
              <div key={item.label} className={`palette-item ${selIdx===i?'sel':''}`} onClick={()=>pick(item)}>
                <span className="pi-icon">{ICONS.file}</span>
                <span className="pi-label">{item.label}</span>
                <span className="pi-badge">open</span>
              </div>
            ))}
          </>}
          {cmdItems.length>0 && <>
            <div className="palette-section-label">Commands</div>
            {cmdItems.map((item,i)=>{
              const globalIdx = fileItems.length+i;
              return (
                <div key={item.label} className={`palette-item ${selIdx===globalIdx?'sel':''}`} onClick={()=>pick(item)}>
                  <span className="pi-icon">{ICONS[item.icon]||ICONS.bolt}</span>
                  <span className="pi-label">{item.label}</span>

// ── Git Panel ─────────────────────────────────────────────────
function GitPanel({ connected, maxUrl, gitStaged, setGitStaged, openFile, onRunInTerminal, onChangedCount }) {
  const [gitFiles, setGitFiles] = React.useState([]);
  const [commitMsg, setCommitMsg] = React.useState('');
  const [gitLoading, setGitLoading] = React.useState(false);
  const [gitBranch, setGitBranch] = React.useState('main');
  const [gitLog, setGitLog] = React.useState([]);
  const [showLog, setShowLog] = React.useState(false);

  const runGit = React.useCallback(async (cmd) => {
    if (!connected) return null;
    try {
      const r = await fetch(maxUrl + '/api/tools/shell/run', {
        method:'POST', headers:authHdrs(),
        body: JSON.stringify({ command: cmd, timeoutMs: 10000 })
      });
      const d = await r.json();
      return d.stdout || d.output || '';
    } catch { return null; }
  }, [connected, maxUrl]);

  const refresh = React.useCallback(async () => {
    setGitLoading(true);
    const status = await runGit('git status --porcelain');
    if (status !== null) {
      const files = status.split('\n').filter(Boolean).map(l => ({
        status: l.slice(0,2).trim() || '?',
        file: l.slice(3).trim()
      }));
      setGitFiles(files.length ? files : []);
      onChangedCount?.(files.length);
    } else {
      setGitFiles([]);
      onChangedCount?.(0);
    }
    const branch = await runGit('git branch --show-current');
    if (branch) setGitBranch(branch.trim());
    setGitLoading(false);
  }, [runGit]);

  React.useEffect(() => { refresh(); }, [connected]);

  const commit = async () => {
    if (!commitMsg.trim()) return;
    const stagedFiles = gitFiles.filter(f => gitStaged[f.file]);
    if (stagedFiles.length === 0) { alert('No files staged. Check the checkboxes first.'); return; }
    const escFile = f => `'${f.file.replace(/'/g,"'\\''")}'`;
    const escMsg  = commitMsg.replace(/'/g,"'\\''");
    onRunInTerminal(`git add ${stagedFiles.map(escFile).join(' ')} && git commit -m '${escMsg}'`);
    setCommitMsg('');
    setTimeout(refresh, 1500);
  };

  const stageAll = () => {
    const all = {};
    gitFiles.forEach(f => all[f.file] = true);
    setGitStaged(all);
  };

  const stagedCount = gitFiles.filter(f => gitStaged[f.file]).length;

  const statusColor = s => s==='M'?'var(--amber)':s==='A'?'var(--green)':s==='D'?'var(--red)':s==='?'?'var(--muted)':'var(--muted)';
  const statusLabel = s => s==='M'?'M':s==='A'?'A':s==='D'?'D':s==='??'?'U':s||'?';

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      {/* Header */}
      <div className="sb-header">
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {ICONS.git}
          <span style={{fontWeight:600}}>Git</span>
          <span style={{fontSize:10,color:'var(--accent2)',fontFamily:'var(--mono)',background:'var(--s4)',padding:'1px 6px',borderRadius:10,border:'1px solid var(--border)'}}>{gitBranch}</span>
        </div>
        <button className="sb-icon-btn" title="Refresh" onClick={refresh} style={{opacity:gitLoading?.5:1}}>{ICONS.reload}</button>
      </div>

      {/* Commit area */}
      <div style={{padding:'8px 10px',borderBottom:'1px solid var(--border)',flexShrink:0}}>
        <textarea className="add-goal-input"
          style={{width:'100%',resize:'none',height:52,marginBottom:6,padding:'5px 8px',boxSizing:'border-box',fontFamily:'inherit',fontSize:11.5,lineHeight:1.5}}
          placeholder="Commit message…" value={commitMsg}
          onChange={e=>setCommitMsg(e.target.value)}
          onKeyDown={e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))commit();}}/>
        <div style={{display:'flex',gap:5,alignItems:'center'}}>
          <button onClick={stageAll} style={{flex:1,fontSize:10.5,color:'var(--muted)',background:'var(--s3)',border:'1px solid var(--border)',borderRadius:4,padding:'3px 0',cursor:'pointer',whiteSpace:'nowrap'}}>
            Stage all <span style={{color:'var(--accent2)'}}>{gitFiles.length}</span>
          </button>
          <button onClick={()=>setGitStaged({})} style={{fontSize:10.5,color:'var(--muted)',background:'none',border:'1px solid var(--border)',borderRadius:4,padding:'3px 8px',cursor:'pointer'}}>
            Clear
          </button>
          <button onClick={commit}
            style={{flex:1,fontSize:11,fontWeight:600,
              background:commitMsg.trim()&&stagedCount>0?'var(--accent)':'var(--s3)',
              color:commitMsg.trim()&&stagedCount>0?'#fff':'var(--muted)',
              border:'none',borderRadius:4,padding:'4px 0',cursor:'pointer',
              opacity:commitMsg.trim()&&stagedCount>0?1:.5,
              display:'flex',alignItems:'center',justifyContent:'center',gap:4}}>
            {ICONS.check} Commit{stagedCount>0?` ${stagedCount}`:''}
          </button>
        </div>
      </div>

      {/* File list */}
      <div className="sb-scroll" style={{flex:1}}>
        {gitLoading && <div style={{padding:'14px 12px',fontSize:11.5,color:'var(--muted)',display:'flex',alignItems:'center',gap:6}}><span className="term-spinner">◌</span> Refreshing…</div>}
        {!gitLoading && gitFiles.length===0 && (
          <div style={{padding:'20px 12px',fontSize:11.5,color:'var(--muted)',textAlign:'center',lineHeight:1.7}}>
            {connected ? <>{ICONS.check}<br/>No changes detected</> : 'Connect MAX to see git status'}
          </div>
        )}
        {!gitLoading && gitFiles.map((f,i)=>{
          const fname = f.file.split('/').pop();
          const fdir  = f.file.includes('/') ? f.file.slice(0, f.file.lastIndexOf('/')) : '';
          return (
            <div key={i} style={{display:'flex',alignItems:'center',gap:6,padding:'4px 10px',cursor:'pointer',borderRadius:4,margin:'1px 4px'}}
              onClick={()=>openFile({name:fname,path:f.file,type:'file'})}
              onMouseEnter={e=>e.currentTarget.style.background='var(--s3)'}
              onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{width:14,height:14,borderRadius:3,background:'var(--s4)',border:`1px solid ${statusColor(statusLabel(f.status))}`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,
                color:statusColor(statusLabel(f.status)),flexShrink:0,fontFamily:'var(--mono)'}}>
                {statusLabel(f.status)}
              </span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:11.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--fg)'}}>{fname}</div>
                {fdir && <div style={{fontSize:9.5,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{fdir}</div>}
              </div>
              <input type="checkbox" checked={!!gitStaged[f.file]}
                onChange={e=>setGitStaged(s=>({...s,[f.file]:e.target.checked}))}
                onClick={e=>e.stopPropagation()} style={{accentColor:'var(--accent)',flexShrink:0,width:13,height:13}}/>
            </div>
          );
        })}
      </div>

      {/* Log toggle */}
      <div style={{borderTop:'1px solid var(--border)',flexShrink:0}}>
        <button onClick={()=>{setShowLog(s=>!s);if(!showLog)runGit('git log --oneline -10').then(l=>setGitLog(l?l.split('\n').filter(Boolean):[]));}}
          style={{width:'100%',padding:'5px 10px',background:'none',border:'none',color:'var(--muted)',fontSize:10.5,cursor:'pointer',display:'flex',alignItems:'center',gap:4,justifyContent:'center'}}>
          {showLog?ICONS.logUp:ICONS.logDown} {showLog?'Hide log':'Git log'}
        </button>
        {showLog && (
          <div style={{padding:'4px 10px 8px',maxHeight:110,overflowY:'auto',borderTop:'1px solid var(--border)'}}>
            {gitLog.map((l,i)=>(
              <div key={i} style={{fontSize:10.5,fontFamily:'var(--mono)',color:'var(--muted)',lineHeight:1.7,display:'flex',gap:8}}>
                <span style={{color:'var(--accent2)',flexShrink:0}}>{l.slice(0,7)}</span>
                <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.slice(8)}</span>
              </div>
            ))}
            {gitLog.length===0 && <div style={{fontSize:10.5,color:'var(--muted2)'}}>No commits yet</div>}
          </div>
        )}
      </div>

      {/* Push / Pull / Diff row */}
      <div style={{padding:'6px 8px',borderTop:'1px solid var(--border)',display:'flex',gap:4,flexShrink:0}}>
        {[['Push',ICONS.arrowUp,'git push'],['Pull',ICONS.arrowDn,'git pull'],['Diff',ICONS.diff,'git diff']].map(([label,icon,cmd])=>(
          <button key={label} onClick={()=>onRunInTerminal(cmd)}
            style={{flex:1,fontSize:10.5,color:'var(--muted)',background:'var(--s3)',border:'1px solid var(--border)',
              borderRadius:5,padding:'4px 0',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:3}}>
            {icon}{label}
          </button>
        ))}
      </div>
    </div>
  );
}

// ── Subtle sound effects ──────────────────────────────────────
function playTone(freq, duration, vol, type='sine') {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  } catch {}
}

function playChokoPop() {
  // Cute two-note chime: C5 then E5
  playTone(523, 0.12, 0.06);
  setTimeout(() => playTone(659, 0.18, 0.05), 100);
}
