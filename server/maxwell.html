// ── Find in files panel ───────────────────────────────────────
function FindInFiles({ connected, maxUrl, onOpenFile, onClose }) {
  const [q, setQ] = React.useState('');
  const [results, setResults] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const inputRef = React.useRef(null);
  React.useEffect(() => { inputRef.current?.focus(); }, []);

  const search = React.useCallback(async (query) => {
    if (!query.trim() || !connected) return;
    setLoading(true); setResults(null);
    try {
      const escaped = query.replace(/\\/g,'\\\\').replace(/"/g,'\\"');
      // Cross-platform Node.js search — no grep dependency
      const script = `
const fs=require('fs'),path=require('path');
const q=${JSON.stringify(query.toLowerCase())};
const SKIP=new Set(['node_modules','.git','dist','build','coverage','.next']);
const EXT=new Set(['.ts','.js','.tsx','.jsx','.json','.md','.css','.html','.py','.go','.rs','.sh','.env']);
const out=[];
function walk(dir,depth){
  if(depth>6)return;
  let en;try{en=fs.readdirSync(dir,{withFileTypes:true})}catch{return}
  for(const e of en){
    if(SKIP.has(e.name)||e.name.startsWith('.'))continue;
    const full=path.join(dir,e.name);
    if(e.isDirectory())walk(full,depth+1);
    else if(EXT.has(path.extname(e.name).toLowerCase())){
      try{
        const lines=fs.readFileSync(full,'utf8').split('\\n');
        lines.forEach((l,i)=>{if(l.toLowerCase().includes(q))out.push(full.replace(/\\\\/g,'/')+'::'+(i+1)+'::'+l.trim().slice(0,120))});
      }catch{}
    }
    if(out.length>=60)return;
  }
}
walk('.',0);out.forEach(r=>console.log(r));`;
      const r = await fetch(`${maxUrl}/api/tools/shell/run`, {
        method:'POST', headers:authHdrs(),
        body: JSON.stringify({ command: `node -e ${JSON.stringify(script)}`, timeoutMs:15000 })
      });
      const d = await r.json();
      const raw = (d.stdout || d.output || '').trim();
      if (!raw) { setResults([]); setLoading(false); return; }
      const parsed = raw.split('\n').filter(Boolean).map(line => {
        const parts = line.split('::');
        if (parts.length >= 3) return { file: parts[0].replace(/^\.\//,''), line: parseInt(parts[1]), text: parts.slice(2).join('::') };
        return null;
      }).filter(Boolean);
      // Group by file
      const grouped = {};
      parsed.forEach(r => { if (!grouped[r.file]) grouped[r.file] = []; grouped[r.file].push(r); });
      setResults(grouped);
    } catch { setResults({}); }
    setLoading(false);
  }, [connected, maxUrl]);

  const handleKey = e => { if (e.key === 'Enter') search(q); if (e.key === 'Escape') onClose(); };
  const fileCount = results ? Object.keys(results).length : 0;
  const matchCount = results ? Object.values(results).flat().length : 0;

  return (
    <>
      <div className="sb-header">
        <span>Find in Files</span>

function getMonacoLanguage(fileName) {
  if (!fileName) return 'plaintext';
  const ext = fileName.split('.').pop().toLowerCase();
  const map = {
    ts:'typescript', tsx:'typescript', js:'javascript', jsx:'javascript',
    json:'json', md:'markdown', css:'css', html:'html', sh:'shell',
    py:'python', rs:'rust', go:'go', env:'ini', yml:'yaml', yaml:'yaml',
    sql:'sql', graphql:'graphql', prisma:'prisma',
  };
  return map[ext] || 'plaintext';
}

function MonacoEditor({ fileName, content, onChange, readOnly, langOverride }) {
  const containerRef = React.useRef(null);
  const editorRef    = React.useRef(null);
  const modelRef     = React.useRef(null);

  // Apply language override without recreating the editor
  React.useEffect(() => {
    if (langOverride && modelRef.current && window.monaco) {
      window.monaco.editor.setModelLanguage(modelRef.current, langOverride);
    }
  }, [langOverride]);

  React.useEffect(() => {
    ensureMonaco(() => {
      if (!containerRef.current) return;
      if (editorRef.current) { editorRef.current.dispose(); }
      const lang = langOverride || getMonacoLanguage(fileName);
      const model = window.monaco.editor.createModel(content || '', lang);
      modelRef.current = model;
      const editor = window.monaco.editor.create(containerRef.current, {
        model,
        theme: 'maxwell-dark',
        fontSize: 13,
        fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
        fontLigatures: true,
        lineHeight: 22,
        padding: { top: 12, bottom: 12 },
        minimap: { enabled: true, scale: 1 },
        scrollBeyondLastLine: false,
        smoothScrolling: true,
        cursorBlinking: 'smooth',
        cursorSmoothCaretAnimation: 'on',
        renderLineHighlight: 'gutter',
        bracketPairColorization: { enabled: true },
        guides: { bracketPairs: true, indentation: true },
        suggest: { showKeywords: true, showSnippets: true },
        quickSuggestions: { other: true, comments: false, strings: false },
        parameterHints: { enabled: true },
        formatOnPaste: true,
        tabSize: 2,
        insertSpaces: true,
        wordWrap: 'off',
        readOnly: !!readOnly,
        scrollbar: { vertical: 'auto', horizontal: 'auto', verticalScrollbarSize: 6, horizontalScrollbarSize: 6 },
        overviewRulerLanes: 0,
      });
      editorRef.current = editor;
      if (onChange) {
        model.onDidChangeContent(() => {
          onChange(model.getValue());
        });
      }
    });
    return () => {
      if (editorRef.current) { editorRef.current.dispose(); editorRef.current = null; }
      if (modelRef.current) { modelRef.current.dispose(); modelRef.current = null; }
    };
  }, [fileName]);

  // Update content when it changes externally (file switch)
  React.useEffect(() => {
    if (modelRef.current && content !== undefined) {
      const cur = modelRef.current.getValue();
      if (cur !== content) {
        modelRef.current.setValue(content || '');
      }
    }
  }, [content]);

  return <div ref={containerRef} style={{width:'100%',height:'100%',minHeight:300}} />;
}

// ── Diff viewer (Monaco diff editor) ─────────────────────────
function DiffViewer({ fileName, original, modified, onAccept, onReject, onClose }) {
  const containerRef = React.useRef(null);
  const diffEditorRef = React.useRef(null);

  React.useEffect(() => {
    ensureMonaco(() => {
      if (!containerRef.current) return;
      const originalModel  = window.monaco.editor.createModel(original  || '', getMonacoLanguage(fileName));
      const modifiedModel  = window.monaco.editor.createModel(modified  || '', getMonacoLanguage(fileName));
      const diffEditor = window.monaco.editor.createDiffEditor(containerRef.current, {
        theme: 'maxwell-dark',
        fontSize: 13,
        fontFamily: "'JetBrains Mono', monospace",
        readOnly: true,
        renderSideBySide: true,
        ignoreTrimWhitespace: false,
        scrollBeyondLastLine: false,
        minimap: { enabled: false },
      });
      diffEditor.setModel({ original: originalModel, modified: modifiedModel });
      diffEditorRef.current = diffEditor;
    });
    return () => { if (diffEditorRef.current) diffEditorRef.current.dispose(); };
  }, [fileName, original, modified]);

  return (
    <div className="diff-overlay" onClick={onClose}>
      <div className="diff-box" onClick={e=>e.stopPropagation()}>
        <div className="diff-header">
          <span style={{display:'flex'}}>{ICONS.diff}</span>

            <span style={{color:'var(--green)'}}>+ proposed</span>

          <div className="diff-actions">
            <button className="cb-accept-all" onClick={onAccept}>Accept</button>
            <button className="cb-reject-all" onClick={onReject}>Reject</button>
            <button className="sb-icon-btn" onClick={onClose} style={{display:'flex'}}>{ICONS.close}</button>

        </div>
        <div className="diff-body" ref={containerRef}/>
      </div>
    </div>
  );
}

// ── Dependency Graph panel ────────────────────────────────────────────────
function DependencyGraph({ connected, maxUrl, onOpenFile }) {
  const [data, setData] = React.useState(null);
  const [loading, setLoading] = React.useState(false);
  const [err, setErr] = React.useState(null);
  const [selected, setSelected] = React.useState(null);
  const svgRef = React.useRef(null);
  const posRef = React.useRef({});

  const load = async () => {
    if (!connected) return;
    setLoading(true); setErr(null);
    try {
      const r = await fetch(`${maxUrl}/api/graph`);
      if (!r.ok) throw new Error(await r.text());
      const d = await r.json();
      // Assign initial positions (simple circle layout)
      const positions = {};
      d.nodes.forEach((n, i) => {
        const angle = (i / d.nodes.length) * Math.PI * 2;
        const r2 = Math.min(90, 20 + d.nodes.length * 4);
        positions[n.id] = { x: 110 + Math.cos(angle) * r2, y: 110 + Math.sin(angle) * r2 };
      });
      posRef.current = positions;
      setData(d);
    } catch(e) { setErr(e.message); }
    setLoading(false);
  };

  React.useEffect(() => { load(); }, [connected]);

  const dragRef = React.useRef(null);

  const handleMouseDown = (e, id) => {
    e.stopPropagation();
    const svg = svgRef.current;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
    dragRef.current = { id, ox: svgP.x - posRef.current[id].x, oy: svgP.y - posRef.current[id].y };
  };

  const handleMouseMove = (e) => {
    if (!dragRef.current) return;
    const svg = svgRef.current;
    const pt = svg.createSVGPoint();
    pt.x = e.clientX; pt.y = e.clientY;
    const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
    const { id, ox, oy } = dragRef.current;
    posRef.current[id] = { x: svgP.x - ox, y: svgP.y - oy };
    setData(d => d ? { ...d } : d); // force re-render
  };

  const handleMouseUp = () => { dragRef.current = null; };

  if (!connected) return <div style={{padding:'24px 12px',textAlign:'center',fontSize:12,color:'var(--muted)'}}>Connect to MAX to view graph.</div>;
  if (loading) return <div style={{padding:'24px 12px',textAlign:'center',fontSize:12,color:'var(--muted)'}}>Scanning imports…</div>;
  if (err) return <div style={{padding:'16px 12px',fontSize:11,color:'var(--red)'}}>{err}</div>;
  if (!data) return <div style={{padding:'16px 12px',fontSize:12,color:'var(--muted)',textAlign:'center'}}>
    <button onClick={load} style={{background:'var(--accent)',border:'none',borderRadius:4,color:'#fff',padding:'4px 10px',cursor:'pointer',fontSize:12}}>Build Graph</button>
  </div>;

  const nodeMap = {};
  data.nodes.forEach(n => { nodeMap[n.id] = n; });
  const selNode = selected ? nodeMap[selected] : null;
  const selEdges = selected ? data.edges.filter(e => e.source===selected || e.target===selected) : [];

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%',overflow:'hidden'}}>
      <div className="sb-header">
        <span>Dependency Graph</span>
        <div style={{display:'flex',gap:4}}>
          <span style={{fontSize:10,color:'var(--muted)'}}>{data.nodes.length} files · {data.edges.length} links</span>
          <button className="sb-icon-btn" onClick={load} title="Refresh">{ICONS.reload}</button>
        </div>
      </div>
      <div style={{flex:1,overflow:'hidden',position:'relative',background:'var(--bg2)'}}>
        <svg ref={svgRef} width="100%" height="100%" viewBox="0 0 220 220"
          onMouseMove={handleMouseMove} onMouseUp={handleMouseUp} onMouseLeave={handleMouseUp}
          style={{cursor:'default'}}>
          <defs>
            <marker id="arrowhead" markerWidth="6" markerHeight="4" refX="5" refY="2" orient="auto">
              <polygon points="0 0, 6 2, 0 4" fill="var(--muted)" opacity="0.5"/>
            </marker>
          </defs>
          {data.edges.map((e,i) => {
            const s = posRef.current[e.source];
            const t = posRef.current[e.target];
            if (!s || !t) return null;
            const isHighlit = selected && (e.source===selected || e.target===selected);
            return <line key={i} x1={s.x} y1={s.y} x2={t.x} y2={t.y}
              stroke={isHighlit?'var(--accent)':'var(--border)'} strokeWidth={isHighlit?1.5:0.8}
              opacity={selected&&!isHighlit?0.2:0.8} markerEnd="url(#arrowhead)"/>;
          })}
          {data.nodes.map(n => {
            const p = posRef.current[n.id];
            if (!p) return null;
            const isSel = selected===n.id;
            const isConn = selected && selEdges.some(e=>e.source===n.id||e.target===n.id);
            return (
              <g key={n.id} transform={`translate(${p.x},${p.y})`}
                onMouseDown={e=>handleMouseDown(e,n.id)}
                onClick={()=>setSelected(selected===n.id?null:n.id)}
                style={{cursor:'pointer'}}>
                <circle r={isSel?6:isConn?5:4}
                  fill={isSel?'var(--accent)':isConn?'var(--accent2)':'var(--fg)'}
                  opacity={selected&&!isSel&&!isConn?0.3:1}/>
                {(isSel||isConn||data.nodes.length<30) && (
                  <text x="0" y={isSel?-8:-7} textAnchor="middle"
                    fill={isSel?'var(--accent)':'var(--muted)'}
                    fontSize={isSel?7:5.5} opacity={selected&&!isSel&&!isConn?0.3:1}
                    style={{pointerEvents:'none',userSelect:'none'}}>
                    {n.label}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>
      {selNode && (
        <div style={{borderTop:'1px solid var(--border)',padding:'8px 10px',fontSize:11,flexShrink:0}}>
          <div style={{fontWeight:600,color:'var(--fg)',marginBottom:4,cursor:'pointer',textDecoration:'underline'}}
            onClick={()=>onOpenFile(selected)}>{selNode.label}</div>
          <div style={{color:'var(--muted)',fontSize:10,marginBottom:4,wordBreak:'break-all'}}>{selected}</div>
          {selEdges.length>0&&<div style={{color:'var(--muted)',fontSize:10}}>
            {selEdges.filter(e=>e.source===selected).length} outgoing · {selEdges.filter(e=>e.target===selected).length} incoming
          </div>}
          <div style={{marginTop:6,display:'flex',flexDirection:'column',gap:2,maxHeight:80,overflowY:'auto'}}>
            {selEdges.map((e,i)=>{
              const other = e.source===selected ? e.target : e.source;
              const dir = e.source===selected ? '→' : '←';
              return <div key={i} style={{fontSize:10,color:'var(--accent)',cursor:'pointer'}}
                onClick={()=>setSelected(other)}>
                {dir} {nodeMap[other]?.label || other}
              </div>;
            })}
          </div>
        </div>
      )}
    </div>
  );
}

  useEffect(() => {

    const ws = new WebSocket(wsUrl);
    
    ws.onopen = () => console.log('[Maxwell] 🌐 WebSocket active');
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'token') {
          // Token streaming handled by find-and-append to the last message with that requestId
          setMessages(m => {
            const last = m[m.length-1];
            if (last && last.role === 'max' && last.requestId === msg.requestId) {
              return [...m.slice(0, -1), { ...last, text: last.text + msg.text }];
            }
            return m;
          });
        }
        if (msg.type === 'done') {
          setIsThinking(false); setStreaming(false);
          // Refresh real usage from API instead of trusting potentially incomplete telemetry
          fetch(`${maxUrl}/api/usage`, { headers: authHdrs(true) }).then(r=>r.json()).then(u => {

        if (msg.type === 'insight') {

        }
        if (msg.type === 'status') {
          setMaxStatus(s => ({ ...s, tension: msg.drive?.tension ?? s.tension }));
        }

        }
        if (msg.type === 'shell_output') {
          setTermLines(l => {
            const last = l[l.length - 1];
            // Append to last line if it's the same type (streaming effect)
            if (last && last.type === (msg.isError ? 'err' : 'out')) {
              return [...l.slice(0, -1), { ...last, text: last.text + msg.text }];
            }
            return [...l, { id: Math.random(), type: msg.isError ? 'err' : 'out', text: msg.text }];
          });
          setTermRunning(false);
        }
      } catch (err) { console.warn('[WS] Message error:', err); }
    };
    ws.onclose = () => console.warn('[WS] Closed');
    socketRef.current = ws;
    return () => ws.close();
  }, [connected, apiKey, maxUrl]);
  const [gitChangedCount, setGitChangedCount] = useState(0);
  const [openTabs, setOpenTabs]     = useState(()=>{ try{ const t=JSON.parse(localStorage.getItem('mx_open_tabs')||'[]'); return Array.isArray(t)?t.filter(x=>x&&typeof x.name==='string'&&x.name.trim()):[];}catch{return [];} });
  const [activeTab, setActiveTab]   = useState(()=>{ const t=localStorage.getItem('mx_active_tab'); return (t&&t.trim()&&t!=='undefined'&&t!=='null')?t:null; });
  
  // Ghost Context: stream current editor buffer to MAX for "eyes on" awareness
  useEffect(() => {
    const tabPath = openTabs.find(t => t.name === activeTab)?.path || activeTab;
    const content = fileContents[tabPath];
    if (!activeTab || !content || !socketRef.current || socketRef.current.readyState !== WebSocket.OPEN) return;
    const timer = setTimeout(() => {
      socketRef.current.send(JSON.stringify({
        type: 'buffer_update',

        content
      }));

  }, [fileContents, activeTab, openTabs]);
  const [messages, setMessages]     = useState(()=>{
    try{
      const s=JSON.parse(localStorage.getItem('mx_messages')||'null');
      if(s&&s.length>0){
        // Re-key any messages with numeric IDs (old format) to avoid collisions
        return s.map(m=>({...m, id: typeof m.id==='string'&&m.id.startsWith('m') ? m.id : nextMsgId()}));
      }
    }catch{}
    return [{id:nextMsgId(),role:'max',persona:'companion',modelTier:'fast',route:'local',text:"Hey — Maxwell is live. What are we building today?"}];
  });
  const [contextMenu, setContextMenu] = useState(null); // {x,y,file}
  const [input, setInput]           = useState('');
  const [isThinking, setIsThinking] = useState(false);
  const [thinkLabel, setThinkLabel] = useState('thinking…');
  const [chatMode, setChatMode]     = useState(null);
  const [slashSuggestions, setSlashSuggestions] = useState([]);
  const [slashIdx, setSlashIdx]     = useState(0);
  const [goals, setGoals]           = useState([]);
  const [newGoal, setNewGoal]       = useState('');
  const [insight, setInsight]       = useState(null);
  const [chokoMsg, setChokoMsg]       = useState(null);
  const [chokoTyping, setChokoTyping] = useState(false);
  const [pendingChanges, setPendingChanges] = useState([]);
  // Agent task tracker — null | { task, goalId, steps:[], status:'running'|'done'|'failed' }
  const [agentTask, setAgentTask] = useState(null);
  const agentTaskTimer = useRef(null);
  const openFileRef   = useRef(null);  // kept fresh each render — lets SSE handler call openFile
  const messagesEndRef = useRef(null);

  // Auto-scroll terminal
  useEffect(()=>{
    if(termBodyRef.current) termBodyRef.current.scrollTop = termBodyRef.current.scrollHeight;
  }, [termLines]);

  // Global keyboard shortcuts
  useEffect(()=>{
    const handler = e => {
      const ctrl = e.metaKey||e.ctrlKey;
      if(e.key==='?') { 
        const tag = e.target.tagName.toLowerCase();
        if(tag!=='input'&&tag!=='textarea') { e.preventDefault(); setShowShortcuts(s=>!s); }
      }
      if(ctrl&&e.key==='b') { e.preventDefault(); setSidebarOpen(s=>!s); }
      if(ctrl&&e.key==='j') { e.preventDefault(); setShowBottom(s=>!s); }
      if(ctrl&&e.shiftKey&&e.key==='S') { e.preventDefault(); setChatMode(m=>m==='swarm'?null:'swarm'); }
      if(ctrl&&e.key==='Enter') { e.preventDefault(); setPendingChanges(ps=>ps.map(p=>p.status==='pending'?{...p,status:'accepted'}:p)); }
      if(ctrl&&e.key==='Backspace') { e.preventDefault(); setPendingChanges(ps=>ps.map(p=>p.status==='pending'?{...p,status:'rejected'}:p)); }
      if(e.key==='Escape') { setShowShortcuts(false); setShowDiff(null); setShowHistory(false); }
    };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  }, []);

  // Ctrl+K / Cmd+K palette
  useEffect(()=>{
    const handler = e => {
      if ((e.metaKey||e.ctrlKey) && e.key==='k') { e.preventDefault(); setShowPalette(p=>!p); }
      if (e.key==='Escape') setShowPalette(false);
    };
    window.addEventListener('keydown', handler);
    return ()=>window.removeEventListener('keydown', handler);
  }, []);
  const inputRef = useRef(null);
  const sseRef = useRef(null);
  const bottomDragY = useRef(0);
  const bottomDragH = useRef(0);

  // Expose globals for ToolChip
  useEffect(()=>{ window.MAX_URL = maxUrl; }, [maxUrl]);
  useEffect(()=>{ window.__showDiff = (opts)=>setShowDiff(opts); }, []);

  // ── Session persistence ──────────────────────────────────────
  useEffect(()=>{
    if(messages.length>1) localStorage.setItem('mx_messages', JSON.stringify(messages.filter(m=>!m.streaming).slice(-100)));
  }, [messages]);
  useEffect(()=>{ localStorage.setItem('mx_open_tabs', JSON.stringify(openTabs)); }, [openTabs]);
  useEffect(()=>{ if(activeTab && activeTab.trim()) localStorage.setItem('mx_active_tab', activeTab); else localStorage.removeItem('mx_active_tab'); }, [activeTab]);

  // Fetch git branch when connected
  useEffect(()=>{
    if(!connected) return;
    fetch(maxUrl+'/api/tools/shell/run',{method:'POST',headers:authHdrs(),body:JSON.stringify({command:'git branch --show-current',timeoutMs:3000})})
      .then(r=>r.json()).then(d=>{ const b=(d.stdout||d.output||'').trim(); if(b) setGitBranch(b); }).catch(()=>{});
  },[connected]);

  // Sentinel — react to SSE file-change events
  useEffect(()=>{
    // Already handled in SSE listener below — just expose setter
  },[]);

  // ── Tension animation (demo mode) ──────────────────────────
  useEffect(()=>{
    if(connected) return;
    const t = setInterval(()=>{
      setMaxStatus(s=>({...s, tension: 0.35 + 0.45 * Math.abs(Math.sin(Date.now()/9000)) }));
    }, 400);
    return ()=>clearInterval(t);
  }, [connected]);

  // Full path for active tab (e.g. 'core/server.ts' not just 'server.ts')
  const activeTabPath = React.useMemo(() =>
    openTabs.find(t => t.name === activeTab)?.path || activeTab || '',
    [openTabs, activeTab]
  );

  // ── Connect MAX ─────────────────────────────────────────────
  useEffect(()=>{
    let mounted=true;
    const tryConnect=async()=>{
      try{
        const apiKey = window.__MAX_API_KEY || localStorage.getItem('maxwell_api_key') || '';
        const r=await fetch(`${maxUrl}/health`,{signal:AbortSignal.timeout(2000)});
        if(!mounted) return;
        if(r.ok){
          // Verify the key actually works (gracefully skip if server is old and lacks /api/me)
          const authCheck = await fetch(`${maxUrl}/api/me`, { headers: authHdrs(true), signal: AbortSignal.timeout(3000) }).catch(()=>null);
          if(authCheck && authCheck.status===401) {
            setConnected(false);
            const hint = apiKey ? apiKey.slice(0,8)+'…' : 'not set';
            setOutputLines([
              {type:'error', text:'[Auth] API key rejected — key in use: '+hint},
              {type:'error', text:'[Auth] Open ⚙ Settings → General and paste the key from .max/api-key.txt'},
            ]);
            return;
          }
          // 404 means old server without /api/me — still connect, key is likely fine
          setConnected(true);
          // Load goals
          fetch(`${maxUrl}/api/goals`, { headers: authHdrs(true) }).then(r=>r.json()).then(gs=>{
            if(mounted&&Array.isArray(gs)) setGoals(gs.map(g=>({id:g.id||g._id,title:g.title,priority:g.priority||0.5})));
          }).catch(()=>{});
          // Load initial status (tension, brain backends, memory count)
          fetch(`${maxUrl}/api/status`, { headers: authHdrs(true) }).then(r=>r.json()).then(s=>{
            if(!mounted) return;
            const tension = s.drive?.tension;
            const memCount = s.memory?.totalMemories;
            if(tension != null) setMaxStatus(prev=>({...prev, tension}));
            if(memCount != null) setMaxStatus(prev=>({...prev, memoryCount: memCount}));
            if(s.brain) setBrainState(s.brain);
            if(s.cwd) setCwd(s.cwd);
            // Populate Output tab with real boot state
            const lines=[];
            lines.push({type:'ok', text:'[MAX] Agent online'});
            const smartB = s.brain?.smart;
            const fastB  = s.brain?.fast;
            if(smartB) lines.push({type:'ok', text:`[Brain] Smart tier: ${smartB.backend || smartB.model || 'online'}`});
            if(fastB)  lines.push({type:'ok', text:`[Brain] Fast tier: ${fastB.backend || fastB.model || 'online'}`});
            if(memCount != null) lines.push({type:'ok', text:`[Memory] Loaded ${memCount} memories`});
            const goalCount = s.goals?.length || s.activeGoals;
            if(goalCount != null) lines.push({type:'ok', text:`[GoalEngine] ${goalCount} active goals`});
            lines.push({type:'info', text:`[Server] Dashboard at ${maxUrl}/dashboard`});
            lines.push({type:'info', text:`[IDE] Maxwell ready at ${maxUrl}/maxwell`});
            setOutputLines(lines);
          }).catch(()=>{});
          // Load real usage/credits
          fetch(`${maxUrl}/api/usage`, { headers: authHdrs(true) }).then(r=>r.json()).then(u=>{
            if(!mounted||!u.today) return;
            const used = parseFloat(u.today.totalCost?.replace('$','')) || 0;
            const cap  = u.budget?.cap || 10;
            setCredits({ used: parseFloat(used.toFixed(4)), total: cap, currency: true });
          }).catch(()=>{});
          if(sseRef.current) try{sseRef.current.close();}catch{}
          // SSE with API key via URL param since EventSource doesn't support custom headers
          const sseUrl = apiKey ? `${maxUrl}/api/events?apiKey=${encodeURIComponent(apiKey)}` : `${maxUrl}/api/events`;
          const es=new EventSource(sseUrl);
          sseRef.current=es;
          es.onmessage=e=>{
            try{
              const d=JSON.parse(e.data);
              if(d.type==='status'){
                const tension = d.drive?.tension ?? d.tension;
                const memCount = d.memory?.totalMemories ?? d.memoryCount;
                const brainState = d.brain;
                setMaxStatus(s=>({...s,
                  tension: tension ?? s.tension,
                  memoryCount: memCount ?? s.memoryCount,
                  brain: brainState || s.brain,
                }));
                if(brainState) setBrainState(brainState);
              }
              if(d.type==='insight'){
                setInsight(d.text||d.content||d.message);
                setTimeout(()=>setInsight(null),8000);
                // Choko reacts to insights too
                if(Math.random()<0.35){
                  const msg = "fresh insight from MAX: " + (d.text||d.content||'').slice(0,60);
                  setTimeout(()=>{setChokoTyping(true);setTimeout(()=>{setChokoTyping(false);playChokoPop();setChokoMsg(msg);setTimeout(()=>setChokoMsg(null),6000);},900);},1500);
                }
              }
              if(d.type==='goal'&&d.action==='added') setGoals(g=>[...g,{id:d.id,title:d.title,priority:0.5}]);
              if(d.type==='sentinel'||d.type==='file_change'){
                const fp = d.file||d.path||'';
                const fname = fp.split('/').pop();
                setSentinelFiles(s=>({...s,[fname]:Date.now()}));
                setTimeout(()=>setSentinelFiles(s=>{const n={...s};delete n[fname];return n;}),3000);
              }
              if(d.type==='goal'&&d.action==='removed') setGoals(g=>g.filter(x=>x.id!==d.id));

              // ── Agent task tracker ──
              if(d.type==='agent_busy'){
                clearTimeout(agentTaskTimer.current);
                setAgentTask({ task:d.task, goalId:d.goalId, steps:[], status:'running' });
              }
              if(d.type==='agent_step_start'){
                setAgentTask(t=>t?{...t,steps:[...t.steps,{step:d.step,action:d.action,tool:d.tool,status:'running'}]}:t);
                // Auto-open file in editor when MAX reads/writes it
                if(d.tool==='file' && ['read','write','replace'].includes(d.toolAction)){
                  const fp = d.params?.filePath || d.params?.path;
                  if(fp){ const name=fp.replace(/\\/g,'/').split('/').pop(); openFileRef.current?.({name,path:fp.replace(/\\/g,'/')}); }
                }
              }
              if(d.type==='agent_step_done'){
                setAgentTask(t=>t?{...t,steps:t.steps.map(s=>s.step===d.step?{...s,status:d.success?'done':'failed',summary:d.summary}:s)}:t);
              }
              if(d.type==='agent_free'){
                setAgentTask(t=>t?{...t,status:d.success?'done':'failed'}:null);
                agentTaskTimer.current = setTimeout(()=>setAgentTask(null), 6000);
              }
              // max.say() completion messages → inject as MAX chat message
              if(d.type==='agent_say' && d.text){
                const sysMsg = { id:nextMsgId(), role:'max', persona:'companion', text:d.text+(d.details?`\n\n_${d.details}_`:''), modelTier:'fast', streaming:false };
                setMessages(m=>[...m, sysMsg]);
              }
            }catch{}
          };
          es.onerror=()=>setConnected(false);
        }
      }catch{ if(mounted) setConnected(false); }
    };
    tryConnect();
    const iv=setInterval(tryConnect,10000);
    return ()=>{mounted=false;clearInterval(iv);if(sseRef.current) sseRef.current.close();};
  },[maxUrl]);

  useEffect(()=>{ messagesEndRef.current?.scrollIntoView({behavior:'smooth'}); },[messages,isThinking]);

  const handleInputChange=e=>{
    const val=e.target.value; setInput(val);
    if(val.startsWith('/')&&!val.includes(' ')){
      setSlashSuggestions(SLASH_CMDS.filter((c,i,a)=>c.cmd.startsWith(val.toLowerCase())&&a.findIndex(x=>x.cmd===c.cmd)===i));
      setSlashIdx(0);
    } else setSlashSuggestions([]);
  };

  const handleKeyDown=e=>{
    if(slashSuggestions.length>0){
      if(e.key==='ArrowDown'){e.preventDefault();setSlashIdx(i=>Math.min(i+1,slashSuggestions.length-1));return;}
      if(e.key==='ArrowUp'){e.preventDefault();setSlashIdx(i=>Math.max(i-1,0));return;}
      if(e.key==='Tab'||e.key==='Enter'){e.preventDefault();setInput(slashSuggestions[slashIdx].cmd+' ');setSlashSuggestions([]);return;}
      if(e.key==='Escape'){setSlashSuggestions([]);return;}
    }
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
  };

  const sendMessage=async(overrideText)=>{
    const text=(overrideText??input).trim();
    if(!text||isThinking) return;
    if(!overrideText) setInput('');
    setSlashSuggestions([]);

    // Client-side slash command interception
    if(text.startsWith('/persona ')){
      const name=text.slice(9).trim().toLowerCase();
      if(PERSONAS[name]&&connected){
        try{
          await fetch(`${maxUrl}/api/persona`,{method:'POST',headers:authHdrs(),body:JSON.stringify({persona:name})});
          setMaxStatus(s=>({...s,persona:name}));
        }catch{}
        setMessages(m=>[...m,
          {id:nextMsgId(),role:'user',text},
          {id:nextMsgId(),role:'max',persona:name,modelTier:'fast',route:'local',
            text:`Switched to **${PERSONAS[name].label}** persona.`}
        ]);
        return;
      }
    }

    const { tier: activeTier, model: activeModel } = resolveModelChoice(selectedOption, text);
    const userMsgId = nextMsgId();
    setMessages(m=>[...m,{id:userMsgId,role:'user',text}]);
    setIsThinking(true); setThinkLabel('thinking…');
    playMaxThink();
    if(!connected){
      setTimeout(()=>{
        setIsThinking(false);
        setMessages(m=>[...m,{id:nextMsgId(),role:'max',persona:'companion',modelTier:'fast',route:'local',
          text:`Not connected to MAX.\n\nStart it with:\n\`\`\`bash\ncd MAX && node launcher.mjs --mode api\n\`\`\`\n\nThen refresh — I'll wire up automatically at **${maxUrl}**.`}]);
      },1200);
      return;
    }
    const msgId2 = nextMsgId();
    try{
      const mode=chatMode; setChatMode(null);
      if(mode==='swarm') setThinkLabel('spinning up swarm workers…');
      else if(mode==='debate') setThinkLabel('running adversarial debate…');

      if (socketRef.current && socketRef.current.readyState === WebSocket.OPEN) {
        setStreaming(true);
        setMessages(m => [...m, { id: msgId2, role: 'max', persona: maxStatus.persona, text: '', modelTier: activeTier, route: 'ws', requestId: msgId2, streaming: true }]);
        
        socketRef.current.send(JSON.stringify({
          type: 'chat_request',
          message: text,
          requestId: msgId2,
          tier: mode==='swarm'?'code':activeTier
        }));
        // Done state and token assembly are handled by ws.onmessage
        return;
      }

      // LEGACY REST FALLBACK
      const endpoint=mode==='swarm'?'/api/swarm':mode==='debate'?'/api/debate':'/api/chat';
      const body=mode==='swarm'?{task:text}:mode==='debate'?{topic:text}:{message:text, model:activeModel, tier:activeTier};
      const r=await fetch(`${maxUrl}${endpoint}`,{method:'POST',headers:authHdrs(),body:JSON.stringify(body)});

      if(r.status===401){
        setIsThinking(false); setStreaming(false);
        setMessages(m=>[...m,{id:msgId2,role:'max',persona:'companion',modelTier:'fast',route:'local',
          text:`**API key rejected.** Open ⚙ Settings → General and paste your key from \`.max/api-key.txt\`.\n\nVisit \`${maxUrl}/maxwell\` directly to get the key auto-injected.`}]);
        return;
      }

      // swarm/debate return plain JSON; chat returns SSE — detect by content-type
      const ct = r.headers.get('content-type')||'';
      let reply='', persona=maxStatus.persona, drive=null;

      if(ct.includes('event-stream')){
        // Real SSE streaming — show tokens as they arrive
        setStreaming(true);
        const route = activeTier==='fast'?'local':'cloud';
        setMessages(m=>[...m,{id:msgId2,role:'max',persona,text:'',modelTier:activeTier,route,streaming:true}]);
        const reader=r.body.getReader(); const dec=new TextDecoder(); let buf='';
        while(true){
          const {done,value}=await reader.read(); if(done) break;
          buf+=dec.decode(value,{stream:true});
          const lines=buf.split('\n'); buf=lines.pop();
          for(const line of lines){
            if(!line.startsWith('data: ')) continue;
            try{
              const ev=JSON.parse(line.slice(6));
              if(ev.type==='token'){
                reply+=ev.text;
                setMessages(m=>m.map(msg=>msg.id===msgId2?{...msg,text:reply}:msg));
              } else if(ev.type==='done'){
                reply=ev.response||reply; persona=ev.persona||persona; drive=ev.drive;
                setMaxStatus(s=>({...s,persona,tension:drive?.tension??s.tension}));
                setMessages(m=>m.map(msg=>msg.id===msgId2?{...msg,text:reply,persona,streaming:false}:msg));
                setStreaming(false);
                // Refresh real spend after each message
                fetch(`${maxUrl}/api/usage`,{headers:authHdrs(true)}).then(r=>r.json()).then(u=>{
                  if(u.today){ const spent=parseFloat(u.today.totalCost?.replace('$','')||0); setCredits(c=>({...c,used:parseFloat(spent.toFixed(4))})); }
                }).catch(()=>{});
              } else if(ev.type==='error'){ throw new Error(ev.message); }
            }catch(pe){ if(pe.message&&!pe.message.includes('JSON')) throw pe; }
          }
        }
        setStreaming(false);
      } else {
        // Plain JSON (swarm/debate)
        const data=await r.json();
        reply=data.reply||data.response||data.result||data.synthesis||data.verdict||JSON.stringify(data);
        persona=data.persona||persona;
        setMessages(m=>[...m,{id:msgId2,role:'max',persona,text:reply,modelTier:activeTier,route:activeTier==='fast'?'local':'cloud',streaming:false}]);
      }

      // Parse TOOL:file:write/replace calls — brace-counting to handle multi-line content
      const toolsFromReply=[];
      const toolPrefixRe=/TOOL:file:(write|replace):/g;
      let toolMatch2;
      while((toolMatch2=toolPrefixRe.exec(reply))!==null){
        const action=toolMatch2[1];
        const start=toolMatch2.index+toolMatch2[0].length;
        let depth=0,i=start,inStr=false,esc=false;
        for(;i<reply.length;i++){
          const c=reply[i];
          if(esc){esc=false;continue;}
          if(c==='\\'&&inStr){esc=true;continue;}
          if(c==='"'){inStr=!inStr;continue;}
          if(inStr) continue;
          if(c==='{') depth++;
          else if(c==='}'){depth--;if(depth===0){i++;break;}}
        }
        try{
          const params=JSON.parse(reply.slice(start,i));
          if(params.filePath){
            toolsFromReply.push({id:msgId2+'-'+toolsFromReply.length,file:params.filePath,
              content:params.content||'',action,status:'pending',msgId:msgId2});
          }
        }catch{}
      }
      // Also add tool chips to the message
      if(toolsFromReply.length>0){
        const toolChips=toolsFromReply.map(t=>({icon:'write',action:'file:'+t.action,label:t.file,ok:true}));
        setMessages(m=>m.map(msg=>msg.id===msgId2?{...msg,tools:toolChips}:msg));
      }
      // Choko reacts to tool calls
      if(reply.includes('TOOL:')){
        const toolMatch=reply.match(/TOOL:(\w+):(\w+)/);
        if(toolMatch){
          const reaction=getChokoReaction(toolMatch[1]+':'+toolMatch[2]);
          if(reaction&&Math.random()<0.6){
            setTimeout(()=>{setChokoTyping(true);setTimeout(()=>{setChokoTyping(false);playChokoPop();setChokoMsg(reaction);setTimeout(()=>setChokoMsg(null),6000);},1000);},800);
          }
        }
      }
      if(activeTier==='fast') setSavings(s=>({...s,local:s.local+1,totalLocal:s.totalLocal+1,totalAll:s.totalAll+1}));
      else setSavings(s=>({...s,cloud:s.cloud+1,totalAll:s.totalAll+1}));
      if(toolsFromReply.length>0) setPendingChanges(p=>[...p,...toolsFromReply]);
      fetch(`${maxUrl}/api/goals`,{headers:authHdrs(true)}).then(r=>r.json()).then(gs=>{if(Array.isArray(gs)) setGoals(gs.map(g=>({id:g.id||g._id,title:g.title,priority:g.priority||0.5})));}).catch(()=>{});
    }catch(err){
      setStreaming(false);
      setMessages(m=>[...m.filter(msg=>msg.id!==msgId2),{id:nextMsgId(),role:'max',persona:'paranoid',text:`Connection error: ${err.message}.`}]);
    }finally{ setIsThinking(false); }
  };

  const runCommand = async (cmd) => {
    if (!cmd.trim() || termRunning) return;
    const id = Date.now();
    setTermLines(l => [...l, { id, type:'prompt', text:cmd }]);
    
    // Choko reacts to interesting commands
    const cmdBase = cmd.trim().split(' ')[0];
    const termReactions = {
      'git': ()=> Math.random()<0.3 && setTimeout(()=>{setChokoTyping(true);setTimeout(()=>{setChokoTyping(false);playChokoPop();setChokoMsg(getChokoReaction('git:commit')||'git command! MAX is on it. 🌿');setTimeout(()=>setChokoMsg(null),5000);},800);},1200),
      'npm': ()=> Math.random()<0.25 && setTimeout(()=>{setChokoTyping(true);setTimeout(()=>{setChokoTyping(false);playChokoPop();setChokoMsg('packages incoming! 📦 choko loves npm.');setTimeout(()=>setChokoMsg(null),5000);},800);},1000),
      'node': ()=> Math.random()<0.2 && setTimeout(()=>{setChokoMsg('MAX is running node! ⚡ choko is watching.');setTimeout(()=>setChokoMsg(null),4000);},1000),
    };
    if(termReactions[cmdBase]) termReactions[cmdBase]();

    setTermHistory(h => [cmd, ...h.slice(0,49)]);

    if (socketRef.current && socketRef.current.readyState === WebSocket.OPEN) {

      setTimeout(() => {

          'git status':    [{type:'out',text:'On branch main'},{type:'out',text:'Changes: src/server.ts, src/routes.ts'}],
          'git log':       [{type:'out',text:'abc1234 feat: add websocket support'},{type:'out',text:'def5678 init: project setup'}],
          'ls':            [{type:'out',text:'src/  tests/  package.json  .env  README.md'}],
          'pwd':           [{type:'out',text:'/home/user/my-fullstack-app'}],
          'node -v':       [{type:'out',text:'v20.11.0'}],
          'npm -v':        [{type:'out',text:'10.2.4'}],
        };
        const out = demos[cmd.trim()] || [{type:'err',text:`command not found: ${cmd.split(' ')[0]} (MAX offline — start with node launcher.mjs --mode api)`}];
        setTermLines(l => [...l, ...out.map(o=>({...o,id:Math.random()}))]);
        setTermRunning(false);
      }, 600 + Math.random()*400);
      return;
    }
  };

  // ── Problems tab — real TypeScript checker ───────────────
  const runProblemsCheck = React.useCallback(async () => {
    setProblemLines([]);
    try {
      const r = await fetch(`${maxUrl}/api/tools/shell/run`, {
        method:'POST', headers:authHdrs(),
        body: JSON.stringify({ command:'npx tsc --noEmit 2>&1', timeoutMs:30000 })
      });
      const d = await r.json();
      const raw = (d.stdout||d.output||d.result||d.stderr||'').trim();
      if (!raw || raw.includes('not found') || raw.includes('command not found')) {
        setProblemLines([{type:'info',text:'No tsconfig.json found — TypeScript check skipped'}]);
        setProblemCount(0); return;
      }
      const lines = raw.split('\n').filter(Boolean);
      // tsc error lines look like: src/foo.ts(12,5): error TS2345: ...
      const errRe = /^(.+)\((\d+),(\d+)\):\s*(error|warning)\s+(TS\d+):\s*(.+)$/;
      const parsed = lines.map(l => {
        const m = l.match(errRe);
        if (m) return { type: m[4]==='error'?'err':'info', file:m[1], line:m[2], col:m[3], code:m[5], msg:m[6], text:`${m[1]}:${m[2]} — ${m[6]}` };
        return { type:'out', text:l };
      });
      const errCount = parsed.filter(p=>p.type==='err').length;
      setProblemLines(parsed);
      setProblemCount(errCount);
    } catch(e) {
      setProblemLines([{type:'err',text:'Failed to run check: '+e.message}]);
    }
  }, [maxUrl]);

  // ── File system API ──────────────────────────────────────
  const listFiles = React.useCallback(async (dir='.') => {
    try {
      const r = await fetch(`${maxUrl}/api/files/tree?dir=${encodeURIComponent(dir)}`, {
        headers: authHdrs(true)
      });
      const d = await r.json();
      const raw = d.files || d.result || [];
      return Array.isArray(raw) ? raw : [];
    } catch { return null; }
  }, [maxUrl]);

  const readFile2 = React.useCallback(async (filePath) => {
    if (fileContents[filePath] !== undefined) return fileContents[filePath];
    try {
      const r = await fetch(maxUrl+'/api/tools/file/read', {
        method:'POST', headers: authHdrs(),
        body: JSON.stringify({ filePath })
      });
      const d = await r.json();
      const content = d.content || d.result || d.text || '';
      setFileContents(c => ({...c, [filePath]: content}));
      return content;
    } catch { return null; }
  }, [maxUrl, fileContents]);

  const saveFile2 = React.useCallback(async (filePath, content) => {
    setSaveStatus('saving');
    try {
      await fetch(maxUrl+'/api/tools/file/write', {
        method:'POST', headers: authHdrs(),
        body: JSON.stringify({ filePath, content })
      });
      const tabName = filePath.split('/').pop();
      setUnsaved(u => ({...u, [tabName]: false}));
      setFileContents(c => ({...c, [filePath]: content}));
      setSaveStatus('saved');
      setTimeout(() => setSaveStatus(''), 2000);
    } catch {
      setSaveStatus('');
    }
  }, [maxUrl]);

  const handleEditorChange = React.useCallback((filePath, newContent) => {
    const tabName = filePath.split('/').pop();
    setFileContents(c => ({...c, [filePath]: newContent}));
    setUnsaved(u => ({...u, [tabName]: true}));
    // Debounced auto-save (2s)
    if (connected) {
      clearTimeout(saveTimers.current[filePath]);
      saveTimers.current[filePath] = setTimeout(() => saveFile2(filePath, newContent), 2000);
    }
  }, [connected, saveFile2]);

  // Ctrl+S manual save
  React.useEffect(() => {
    const handler = e => {
      if ((e.metaKey||e.ctrlKey) && e.key==='s') {
        e.preventDefault();
        if (activeTabPath && fileContents[activeTabPath] !== undefined) {
          saveFile2(activeTabPath, fileContents[activeTabPath]);
        } else if (activeTab && fileContents[activeTab] !== undefined) {
          saveFile2(activeTabPath || activeTab, fileContents[activeTab]);
        }
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [activeTab, activeTabPath, fileContents, saveFile2]);

  // Ctrl+Shift+F = find in files, Ctrl+P = command palette
  React.useEffect(() => {
    const handler = e => {
      if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='F') {
        e.preventDefault(); setSideTab('search'); setSidebarOpen(true);
      }
      if ((e.ctrlKey||e.metaKey) && e.key==='p' && !e.shiftKey) {
        e.preventDefault(); setShowPalette(true);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, []);

  // Load real file tree when connected
  React.useEffect(() => {
    if (!connected) return;
    listFiles('.').then(files => {
      if (files && files.length > 0) {
        // Convert MAX file list to tree format
        const buildTree = (entries) => entries
          .filter(e => !e.name?.startsWith('.') && !['node_modules','dist','build','.git'].includes(e.name))
          .map(e => ({
            id: e.path || e.name,
            name: e.name || e.path?.split('/').pop(),
            type: e.type==='directory'||e.isDir ? 'dir' : 'file',
            path: e.path || e.name,
            ext: (e.name||'').split('.').pop(),
            children: e.children ? buildTree(e.children) : undefined,
          }));
        setRealFiles(buildTree(files));
      }
    });
  }, [connected]);

  const addGoal=async()=>{
    if(!newGoal.trim()) return;
    const title=newGoal.trim(); setNewGoal('');
    const newG={id:Date.now().toString(),title,priority:0.7};
    setGoals(g=>[...g,newG]);
    // Choko reacts to new goals
    if(Math.random()<0.5){
      const reaction = getChokoReaction('goals:add');
      setTimeout(()=>{setChokoTyping(true);setTimeout(()=>{setChokoTyping(false);playChokoPop();setChokoMsg(reaction||'new goal! MAX is on it. 🎯');setTimeout(()=>setChokoMsg(null),5000);},700);},400);
    }
    if(connected) try{ await fetch(`${maxUrl}/api/goals`,{method:'POST',headers:authHdrs(),body:JSON.stringify({title,priority:0.7})}); }catch{}
  };

  const doneGoal=async id=>{
    setGoals(g=>g.filter(x=>x.id!==id));
    if(connected) try{ await fetch(`${maxUrl}/api/goals/${id}`,{method:'DELETE',headers:authHdrs(true)}); }catch{}
  };

  const BINARY_EXTS = new Set(['exe','dll','bin','zip','tar','gz','bz2','7z','rar','pdf','db','sqlite','sqlite3','wasm','so','dylib','class','jar','pyc','pyo','o','a','lib']);
  const IMAGE_EXTS  = new Set(['png','jpg','jpeg','gif','webp','ico','bmp','tiff','avif']);

  const openFile=async f=>{
    const path = f.path || f.name;
    const tabName = f.name || path.split('/').pop();
    const ext = (tabName.split('.').pop()||'').toLowerCase();
    if(!openTabs.find(t=>t.name===tabName)) setOpenTabs(ts=>[...ts,{name:tabName, path}]);
    setActiveTab(tabName); setShowPreview(false); setLangOverride(null);
    // Binary / image guard
    if (BINARY_EXTS.has(ext)) {
      setFileContents(c=>({...c,[path]:`// Binary file — cannot display in editor\n// ${path}`}));
      return;
    }
    if (IMAGE_EXTS.has(ext)) {
      setFileContents(c=>({...c,[path]:`__IMAGE__:${maxUrl}/api/files/raw?path=${encodeURIComponent(path)}`}));
      return;
    }
    // Load real content if connected
    if (connected && fileContents[path] === undefined) {
      const content = await readFile2(path);
      if (content !== null) setFileContents(c => ({...c, [path]: content}));
    }
  };
  // Keep ref fresh so the SSE handler (closed over on mount) always calls the latest openFile
  openFileRef.current = openFile;

  const renameFile = async (file) => {
    const oldPath = file.path || file.name;
    const oldName = file.name;
    const newName = prompt('Rename to:', oldName);
    if (!newName || newName === oldName) return;
    const newPath = oldPath.replace(oldName, newName);
    const safe = (p) => `"${p.replace(/"/g,'\\"')}"`;
    await shellRun(`node -e "require('fs').renameSync(${JSON.stringify(oldPath)},${JSON.stringify(newPath)})"`);
    // Update open tabs
    setOpenTabs(ts => ts.map(t => t.name===oldName ? {...t, name:newName, path:newPath} : t));
    if (activeTab === oldName) setActiveTab(newName);
    setFileContents(c => { const n={...c}; if(c[oldPath]!==undefined){n[newPath]=c[oldPath]; delete n[oldPath];} return n; });

  const persona=PERSONAS[maxStatus.persona]||PERSONAS.companion;
  const flattenTree=(arr)=>(arr||[]).flatMap(f=>f.type==='dir'?flattenTree(f.children||[]):[f]);

  const handleAbort = () => {
    if (socketRef.current && socketRef.current.readyState === WebSocket.OPEN) {
      socketRef.current.send(JSON.stringify({ type: 'cancel_request' }));

  return (
    <div className="ide">
      {showSettings && <SettingsModal onClose={()=>setShowSettings(false)} maxUrl={maxUrl} setMaxUrl={setMaxUrl} onOpenSetup={()=>setShowSetup(true)}/>}
      {showSetup && <SetupWizard onDismiss={()=>setShowSetup(false)}/>}
      {showShortcuts && <ShortcutOverlay onClose={()=>setShowShortcuts(false)}/>}
      {showLangPicker && activeTab && (
        <LangPicker
          current={langOverride || getMonacoLanguage(activeTab)}
          onSelect={lang=>{ setLangOverride(lang); setShowLangPicker(false); }}
          onClose={()=>setShowLangPicker(false)}
        />
      )}
      {showDiff && (
        <DiffViewer
          fileName={showDiff.fileName}
          original={showDiff.original}
          modified={showDiff.modified}
          onAccept={()=>{
            if(showDiff.pendingId) setPendingChanges(ps=>ps.map(p=>p.id===showDiff.pendingId?{...p,status:'accepted'}:p));
            setShowDiff(null);
          }}
          onReject={()=>{
            if(showDiff.pendingId) setPendingChanges(ps=>ps.map(p=>p.id===showDiff.pendingId?{...p,status:'rejected'}:p));
            setShowDiff(null);
          }}
          onClose={()=>setShowDiff(null)}
        />
      )}
      {(chokoMsg || chokoTyping) && (
        <ChokoToast
          msg={chokoMsg}
          typing={chokoTyping}
          onClose={()=>{setChokoMsg(null);setChokoTyping(false);}}
          onSendToMax={chokoMsg ? async ()=>{
            // Queue current Choko message as a MAX goal
            const goalTitle = 'Choko spotted: ' + chokoMsg.replace(/[^ws~!?.,]/g,'').trim().slice(0,80);
            setMessages(m=>[...m,{id:nextMsgId(),role:'max',persona:'companion',modelTier:'fast',
              text:'Choko queued a task for me~ 🍫 Looking into: **' + chokoMsg.replace(/[^ws~!?,.-]/g,'').slice(0,60) + '**'}]);
            setChokoMsg(null);
            if(connected){
              try{ await fetch(maxUrl+'/api/goals',{method:'POST',headers:authHdrs(),body:JSON.stringify({title:goalTitle,priority:0.6})}); }catch{}
            }
          } : undefined}
        />
      )}
      {showPalette && (
        <CommandPalette
          files={realFiles && realFiles.length > 0 ? realFiles : DEMO_FILES}
          onOpenFile={f=>{openFile(f);setShowPreview(false);}}
          onRunCmd={cmd=>{

              <div className="slash-picker">
                {slashSuggestions.map((s,i)=>(
                  <div key={s.cmd} className={`slash-item ${i===slashIdx?'sel':''}`} onMouseDown={()=>{setInput(s.cmd+' ');setSlashSuggestions([]);inputRef.current?.focus();}}>
                    <span className="sc-cmd">{s.cmd}</span>
                    <span className="sc-desc">{s.desc}</span>
                  </div>
                ))}
              </div>
            )}
            <div className="input-row">
              <textarea ref={inputRef} className="mp-textarea"
                placeholder={chatMode?`${chatMode} mode — describe your task…`:"Talk to MAX… or /command"}
                value={input} onChange={handleInputChange} onKeyDown={handleKeyDown} rows={1}
                onInput={e=>{e.target.style.height='auto';e.target.style.height=Math.min(e.target.scrollHeight,110)+'px';}}
              />
              <button className="send-btn" onClick={()=>sendMessage()} disabled={isThinking||!input.trim()} style={{display:'flex',alignItems:'center',justifyContent:'center'}}>
                {ICONS.send}
              </button>
            </div>
          </div>
        </div>
      </div>
      {/* ── Status bar ── */}
      <StatusBar
        connected={connected} maxStatus={maxStatus} goals={goals}
        activeTab={activeTab} saveStatus={saveStatus} gitBranch={gitBranch}
        persona={persona} problemCount={problemCount} langOverride={langOverride}
        onClickGit={()=>{setSideTab('git');setSidebarOpen(true);}}
        onClickGoals={()=>{setSideTab('goals');setSidebarOpen(true);}}
        onClickErrors={()=>{setBottomTab('problems');setShowBottom(true);}}
        onClickMemory={()=>setShowSettings(true)}
        onClickLang={()=>setShowLangPicker(l=>!l)}
        onClickShortcuts={()=>setShowShortcuts(true)}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
